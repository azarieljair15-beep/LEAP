  'You are the lily pad.','The frog rises.',
  'The swamp has a new story.','30 pads. Nothing less.',
  'The best run this swamp has ever seen.',
  'You moved like water should.','Pure instinct.',
  'The sky watched you fly.','30 and beyond.',
  'The lily pads will remember.','Frog: victorious.',
];

let deathPhraseIdx = 0;
function pickDeathPhrase() {
  let pool;
  if (deathType === 'water') pool = SPLASH_PHRASES;
  else if (deathType === 'sink') pool = SUNKEN_PHRASES;
  else if (deathType === 'lava') pool = BURNED_PHRASES;
  else if (deathType === 'eaten') pool = EATEN_PHRASES;
  else pool = FROZEN_PHRASES;
  deathPhraseIdx = Math.floor(Math.random() * pool.length);
}

// ── Death / Win screens ───────────────────────
function drawOver() {
  const _oe = Date.now() - gameEndTime;
  const _oa = Math.min(0.82, _oe / 700);
  ctx.fillStyle = `rgba(0,0,16,${_oa.toFixed(2)})`; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';

  if (deathType === 'win') {
    // Win celebration
    ctx.fillStyle = '#ffd700'; ctx.font = 'bold 56px Arial';
    ctx.fillText('WIN!', W/2, 180);
    ctx.fillStyle = '#aaa'; ctx.font = '17px Arial';
    const winPhrase = WIN_PHRASES[deathPhraseIdx % WIN_PHRASES.length];
    ctx.fillText(winPhrase, W/2, 218);
  } else {
    const configs = {
      water: { heading:'SPLASH!', col:'#ff4848', pool: SPLASH_PHRASES },
      sink:  { heading:'SUNKEN!', col:'#4ab8ff', pool: SUNKEN_PHRASES },
      lava:  { heading:'BURNED!', col:'#ff7720', pool: BURNED_PHRASES },
      ice:   { heading:'FROZEN!', col:'#80d0ff', pool: FROZEN_PHRASES },
      eaten: { heading:'EATEN!',  col:'#ff2020', pool: EATEN_PHRASES  },
    };
    const cfg = configs[deathType] || configs.water;
    ctx.fillStyle = cfg.col; ctx.font = 'bold 46px Arial'; ctx.fillText(cfg.heading, W/2, 200);
    ctx.fillStyle = '#aaa'; ctx.font = '17px Arial';
    ctx.fillText(cfg.pool[deathPhraseIdx % cfg.pool.length], W/2, 238);
  }

  ctx.fillStyle = '#fff'; ctx.font = 'bold 24px Arial'; ctx.fillText('Score: ' + score, W/2, 290);
  if (isNewBest && score > 0) {
    ctx.fillStyle = '#ffd700'; ctx.font = '17px Arial'; ctx.fillText('🏆  New Best!', W/2, 322);
  }

  // Second chance offer
  if (frog && frog.secondChancePending && !secondChanceUsed && lilyPadsBalance >= 20) {
    ctx.fillStyle = 'rgba(180,130,0,0.92)';
    ctx.beginPath(); ctx.roundRect(W/2 - 110, 330, 220, 52, 14); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 17px Arial';
    ctx.fillText('SECOND CHANCE', W/2, 355);
    ctx.fillStyle = '#ffe080'; ctx.font = '14px Arial';
    ctx.fillText('Spend 20🍃 to keep going', W/2, 375);
    ctx.fillStyle = '#346034';
    ctx.beginPath(); ctx.roundRect(W/2-90, 398, 180, 52, 26); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 20px Arial'; ctx.fillText('TRY AGAIN', W/2, 432);
    ctx.fillStyle = '#1a2e1a';
    ctx.beginPath(); ctx.roundRect(W/2-80, 462, 160, 40, 20); ctx.fill();
    ctx.fillStyle = '#9de89d'; ctx.font = '15px Arial'; ctx.fillText('Return to menu', W/2, 488);
  } else {
    ctx.fillStyle = '#346034';
    ctx.beginPath(); ctx.roundRect(W/2-90, 350, 180, 52, 26); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.font = 'bold 20px Arial'; ctx.fillText('TRY AGAIN', W/2, 384);
    ctx.fillStyle = '#1a2e1a';
    ctx.beginPath(); ctx.roundRect(W/2-80, 416, 160, 40, 20); ctx.fill();
    ctx.fillStyle = '#9de89d'; ctx.font = '15px Arial'; ctx.fillText('Return to menu', W/2, 442);
  }

  const elapsed = Date.now() - gameEndTime;
  const remaining = Math.max(0, (AUTO_MENU_DELAY - elapsed) / 1000);
  if (remaining < 5 && remaining > 0) {
    ctx.fillStyle = `rgba(180,180,180,${0.5 + 0.5 * Math.sin(frame * 0.18)})`;
    ctx.font = '12px Arial';
    ctx.fillText('Returning to menu in ' + remaining.toFixed(0) + 's...', W/2, H - 20);
  }
  ctx.textAlign = 'left';
}

// ── Input helpers ─────────────────────────────
function inRect(x, y, rx, ry, rw, rh) { return x >= rx && x <= rx + rw && y >= ry && y <= ry + rh; }
function canvasXY(e) {
  const r = C.getBoundingClientRect();
  const src = e.touches && e.touches.length ? e.touches[0] : e;
  const cx = src.clientX !== undefined ? src.clientX : e.clientX;
  const cy = src.clientY !== undefined ? src.clientY : e.clientY;
  return [(cx - r.left) * (W / r.width), (cy - r.top) * (H / r.height)];
}

function press(px = W/2, py = H/2) {
  resumeAC(); startAmbience();

  if (gs === 'menu') {
    if (menuPage === 'main') {
      if (inRect(px, py, W/2-90, 262, 180, 48)) { startGame(); return; }
      if (inRect(px, py, W/2-82, 320, 164, 40)) { menuPage = 'frogs'; return; }
      if (inRect(px, py, W/2-82, 370, 164, 40)) { menuPage = 'shop'; return; }
      if (inRect(px, py, W/2-78, 420, 156, 38)) { menuPage = 'settings'; return; }

    } else if (menuPage === 'frogs') {
      if (inRect(px, py, W/2-70, H-66, 140, 42)) { menuPage = 'main'; return; }
      const cols = 4, cellW = W/cols;
      const gridTop = 264, gridBot = H-72;
      const skinRows = Math.ceil(SKINS.length / cols);
      const cellH = (gridBot-gridTop)/skinRows;
      const col = Math.floor(px / cellW), row = Math.floor((py - gridTop) / cellH);
      if (row >= 0 && row < skinRows && col >= 0 && col < 4) {
        const idx = row*4 + col;
        if (idx < SKINS.length && skinOwned(SKINS[idx].id)) {
          equippedSkin = SKINS[idx].id; saveProgress();
        }
      }
      return;

    } else if (menuPage === 'shop') {
      if (inRect(px, py, W/2-70, H-66, 140, 42)) { menuPage = 'main'; shopScrollCosm = 0; shopScrollTrail = 0; return; }
      // Tab click
      const tabHits = [
        { id:'cosmetics', x:8,   w:111 },
        { id:'trails',    x:125, w:111 },
        { id:'bundles',   x:242, w:111 },
        { id:'secret',    x:359, w:111 },
      ];
      for (const tab of tabHits) {
        if (inRect(px, py, tab.x, 88, tab.w, 30)) { shopSection = tab.id; shopPreviewId = null; shopPreviewType = null; return; }
      }
      if (shopSection === 'secret') return;

      if (shopSection === 'bundles') {
        const BUNDLES = [{ id:'cyborg', label:'CYBORG', cost:500 }];
        // Buy/Equip button for previewed bundle
        if (shopPreviewType === 'bundle' && shopPreviewId && inRect(px, py, W/2-70, 218, 140, 34)) {
          const bid = shopPreviewId;
          const bundle = BUNDLES.find(b => b.id === bid);
          if (bundle) {
            const owned = ownedBundles.includes(bid);
            if (equippedBundle === bid) { equippedBundle = null; }
            else if (owned) {
              equippedBundle = bid;
              if (bid === 'cyborg') {
                if (equippedAccessory && !CYBORG_ALLOWED.has(equippedAccessory)) { equippedAccessory = null; equippedAccessory2 = null; }
                if (equippedAccessory2 && !CYBORG_ALLOWED.has(equippedAccessory2)) equippedAccessory2 = null;
              }
            }
            else if (lilyPadsBalance >= bundle.cost) {
              lilyPadsBalance -= bundle.cost; ownedBundles.push(bid); equippedBundle = bid;
              if (bid === 'cyborg') {
                if (equippedAccessory && !CYBORG_ALLOWED.has(equippedAccessory)) { equippedAccessory = null; equippedAccessory2 = null; }
                if (equippedAccessory2 && !CYBORG_ALLOWED.has(equippedAccessory2)) equippedAccessory2 = null;
              }
            }
            shopPreviewId = null; shopPreviewType = null; saveProgress();
          }
          return;
        }
        // Bundle card click → preview
        const bGridTop = 268;
        BUNDLES.forEach((bundle, idx) => {
          const by = bGridTop + idx * 130 + 55;
          if (inRect(px, py, W/2-150, by-50, 300, 110)) {
            if (shopPreviewId === bundle.id) { shopPreviewId = null; shopPreviewType = null; }
            else { shopPreviewId = bundle.id; shopPreviewType = 'bundle'; }
          }
        });
        return;
      }

      const items = shopSection === 'cosmetics' ? ACCESSORIES : TRAILS;
      const scroll = shopSection === 'cosmetics' ? shopScrollCosm : shopScrollTrail;
      const cols = 3, cellW = W / cols;
      const gridTop = 262, cellH = 82;
      const visRows = Math.ceil((H - gridTop - 80) / cellH);

      // Buy/Equip button for previewed item
      const previewType = shopSection === 'cosmetics' ? 'accessory' : 'trail';
      if (shopPreviewType === previewType && shopPreviewId && inRect(px, py, W/2-70, 218, 140, 34)) {
        const item2 = items.find(it => it.id === shopPreviewId);
        if (item2) {
          if (shopSection === 'cosmetics') {
            const owned = ownedAccessories.includes(item2.id);
            if (owned) { equipAccessory(item2.id); }
            else if (lilyPadsBalance >= item2.cost) { lilyPadsBalance -= item2.cost; ownedAccessories.push(item2.id); equipAccessory(item2.id); }
          } else {
            const owned = ownedTrails.includes(item2.id);
            if (owned) { equippedTrail = equippedTrail === item2.id ? null : item2.id; saveProgress(); }
            else if (lilyPadsBalance >= item2.cost) { lilyPadsBalance -= item2.cost; ownedTrails.push(item2.id); equippedTrail = item2.id; saveProgress(); }
          }
          shopPreviewId = null; shopPreviewType = null;
        }
        return;
      }

      // Scroll arrows
      const totalRows = Math.ceil(items.length / cols);
      if (totalRows > visRows) {
        if (inRect(px, py, W/2-30, gridTop-20, 60, 20)) {
          if (shopSection === 'cosmetics') shopScrollCosm = Math.max(0, shopScrollCosm - 1);
          else shopScrollTrail = Math.max(0, shopScrollTrail - 1);
          return;
        }
        if (inRect(px, py, W/2-30, H-92, 60, 20)) {
          const maxScroll = totalRows - visRows;
          if (shopSection === 'cosmetics') shopScrollCosm = Math.min(maxScroll, shopScrollCosm + 1);
          else shopScrollTrail = Math.min(maxScroll, shopScrollTrail + 1);
          return;
        }
      }

      const col = Math.floor(px / cellW);
      const rowRaw = Math.floor((py - gridTop) / cellH);
      const idx = (rowRaw + scroll) * cols + col;

      if (rowRaw < 0 || rowRaw >= visRows || col < 0 || col >= cols || idx < 0 || idx >= items.length) return;
      const item = items[idx];
      // Owned items equip directly; unowned items go to preview first
      if (shopSection === 'cosmetics') {
        const owned = ownedAccessories.includes(item.id);
        if (owned) { equipAccessory(item.id); shopPreviewId = null; shopPreviewType = null; }
        else { shopPreviewId = item.id === shopPreviewId ? null : item.id; shopPreviewType = shopPreviewId ? 'accessory' : null; }
      } else {
        const owned = ownedTrails.includes(item.id);
        if (owned) { equippedTrail = equippedTrail === item.id ? null : item.id; saveProgress(); shopPreviewId = null; shopPreviewType = null; }
        else { shopPreviewId = item.id === shopPreviewId ? null : item.id; shopPreviewType = shopPreviewId ? 'trail' : null; }
      }
      return;

    } else {
      if (inRect(px, py, 0, 180, W, 60)) { sfxOn = !sfxOn; return; }
      if (inRect(px, py, 0, 255, W, 60)) {
        ambienceOn = !ambienceOn;
        if (AmbiAC) { if (ambienceOn) AmbiAC.resume(); else AmbiAC.suspend(); }
        if (!ambienceOn) stopEventAmbience();
        return;
      }
      if (inRect(px, py, W/2-70, 438, 140, 44)) { menuPage = 'main'; return; }
      if (inRect(px, py, W/2-60, 502, 120, 34)) {
        if (currentUser) { doLogout(); } else { showAuthOverlay(); }
        return;
      }
    }
    return;
  }

  if (gs !== 'play') {
    const elapsed = Date.now() - gameEndTime;
    const hasSC = frog && frog.secondChancePending && !secondChanceUsed && lilyPadsBalance >= 20;
    if (hasSC) {
      // Second chance layout: SC button y=330, TRY AGAIN y=398, Return to menu y=462
      if (inRect(px, py, W/2-110, 330, 220, 52)) {
        lilyPadsBalance -= 20; secondChanceUsed = true;
        frog.secondChancePending = false;
        lives = 1; frog.dead = false; gs = 'play';
        spawnGraceUntil = Date.now() + 2000;
        invincibleUntil = frame + 120;
        let respawnPad = curPad;
        while (respawnPad > 0 && pads[respawnPad].st >= 2) respawnPad--;
        const rp = pads[respawnPad];
        frog.x = rp.x; frog.y = rp.y - 23;
        frog.vx = 0; frog.vy = 0; frog.grounded = true; frog.onIce = false;
        curPad = respawnPad; saveProgress(); return;
      }
      if (inRect(px, py, W/2-90, 398, 180, 52)) { startGame(); return; }
      if (inRect(px, py, W/2-80, 462, 160, 40)) { gs='menu'; menuPage='main'; return; }
    } else {
      // Normal death layout: TRY AGAIN y=350, Return to menu y=416
      if (inRect(px, py, W/2-90, 350, 180, 52)) { startGame(); return; }
      if (inRect(px, py, W/2-80, 416, 160, 40)) { gs='menu'; menuPage='main'; return; }
      // Catch-all: any other click after a short delay also restarts
      if (elapsed > 1200) { startGame(); return; }
    }
    return;
  }

  // Return to Menu button (visible on first pad or post-respawn)
  if (score === 0 || (frame < invincibleUntil && lives < 3)) {
    if (inRect(px, py, W - 162, H - 50, 150, 34)) { gs = 'menu'; menuPage = 'main'; return; }
  }

  holding = true;
  if (frog.grounded && !frog.dead && !frog.balancing) frog.charging = true;
}

function release() {
  if (gs !== 'play' || !holding) return;
  holding = false; frogJump();
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' && !e.repeat) {
    e.preventDefault();
    if (gs === 'menu' && menuPage === 'main') { resumeAC(); startAmbience(); startGame(); return; }
    press();
  }
  if (e.code === 'KeyQ' && !e.repeat && gs === 'play') {
    const f = frog;
    const canBalance = f.grounded && !f.dead
      && currentEvent !== 'winter'
      && currentEvent !== 'volcanic'
      && curPad !== 0
      && !(frame < invincibleUntil && lives < 3);
    if (canBalance) { f.balancing = !f.balancing; if (!f.balancing) f.balanceT = 0; }
  }
});
document.addEventListener('keyup', e => { if (e.code === 'Space') { e.preventDefault(); release(); } });
C.addEventListener('mousedown', e => { const [x, y] = canvasXY(e); press(x, y); });
C.addEventListener('mouseup', release);
C.addEventListener('mousemove', e => { const [x, y] = canvasXY(e); cursorWX = x + camX; cursorWY = y; });
C.addEventListener('touchstart', e => { e.preventDefault(); const [x, y] = canvasXY(e); press(x, y); }, { passive: false });
C.addEventListener('touchend', e => { e.preventDefault(); release(); }, { passive: false });

// ── Main loop ─────────────────────────────────
let _lastT = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  if (ts - _lastT < 14.5) return; // cap at ~69fps (fixes 2× speed on 120Hz displays)
  _lastT = ts;
  frame++; wv++; tod = (tod + TOD_SPEED) % 1;
  // Hard-reset all context state before every frame — prevents any leaked alpha,
  // transform, composite op, or shadow from a previous frame from darkening the scene
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';
  ctx.shadowBlur = 0;
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  drawBG();

  if (gs === 'play') {
    pads.forEach(padTick);
    tickGators();
    // Drift pads left; frog follows if grounded
    const PAD_DRIFT = 0.4;
    pads.forEach(p => { p.x -= PAD_DRIFT; });
    if (frog && frog.grounded) frog.x -= PAD_DRIFT;
    camX -= PAD_DRIFT; // keep camera in sync
    if (currentEvent !== 'winter') bgPads.forEach(bp => { bp.x -= PAD_DRIFT * 0.5; });
    const prevFrogY = frog ? frog.y : 0;
    frogTick();
    tickBugs();
    tickEvent();
    camX += (frog.x - 170 - camX) * 0.07;

    // Trail update
    if (equippedTrail || equippedBundle === 'cyborg') {
      frogTrail.push({ x: frog.x, y: frog.y });
      if (frogTrail.length > 30) frogTrail.shift();
    } else { frogTrail = []; }

    // Landing detection
    if (!frog.grounded && !frog.dead && frog.vy > 0) {
      const padW = currentEvent === 'spring' ? 1.4 : 1;
      // Normal pads
      for (let i = curPad + 1; i < Math.min(curPad + 5, pads.length); i++) {
        const p = pads[i];
        if (p.st === 3) continue;
        if (Math.abs(frog.x - p.x) <= (p.w * padW)/2 + 4 &&
            frog.y >= p.y - 24 && prevFrogY <= p.y + 16) {
          frog.grounded = true; frog.vy = 0; frog.vx = 0;
          frog.alpha = 1;
          frog.sqY = 0.82; frog.sqX = 1.12;
          frog.y = p.y - 23; frog.onIce = false;
          curPad = i; score++;
          const padMult = Date.now() < padBoostEnd ? 2 : 1;
          lilyPadsTotal += padMult; lilyPadsBalance += padMult;
          deferredSave();
          spark(frog.x, frog.y, 'land');
          setTimeout(playLand, 0);
          padActivate(p);
          if (curPad >= pads.length - 8) extendLevel();
          // Win check
          if (score >= WIN && !isNewBest) {
            if (score > best) { best = score; isNewBest = true; }
            gamesWon++;
            if (WIN < 100) WIN = Math.min(100, 30 + (gamesWon - 1) * 10);
            else WIN = Infinity; // endless after reaching 100
            saveProgress();
            deathType = 'win'; deathFrame = frame;
            frog.dead = true; gs = 'dead'; gameEndTime = Date.now();
            deathPhraseIdx = Math.floor(Math.random() * WIN_PHRASES.length);
          }
          break;
        }
      }
      // Ice landing (winter event)
      if (!frog.grounded && currentEvent === 'winter' && frog.y >= WATER_Y - 4 && prevFrogY <= WATER_Y + 8) {
        frog.grounded = true; frog.vy = 0; frog.vx = 0;
        frog.sqY = 0.84; frog.sqX = 1.10;
        frog.y = WATER_Y - 2;
        frog.onIce = true; frozenDamageTimer = 0;
        spark(frog.x, WATER_Y, 'land');
        setTimeout(playLand, 0);
        if (score >= WIN && !isNewBest) {
          if (score > best) { best = score; isNewBest = true; }
          gamesWon++; if (WIN < 100) WIN = Math.min(100, 30 + (gamesWon-1)*10); else WIN = Infinity;
          saveProgress(); deathType = 'win'; deathFrame = frame;
          frog.dead = true; gs = 'dead'; gameEndTime = Date.now();
          deathPhraseIdx = Math.floor(Math.random() * WIN_PHRASES.length);
        }
      }
    }

    // Sunk pad death
    if (frog.grounded && !frog.onIce && curPad >= 0 && pads[curPad].st === 3) {
      if (frame >= invincibleUntil) {
        takeDamage('sink');
      }
    }

    // Water hit (missed all pads and not on ice)
    if (!frog.grounded && !frog.dead && frog.y >= WATER_Y && currentEvent !== 'winter') {
      if (frame >= invincibleUntil) {
        takeDamage('water');
        // If takeDamage returned early (spawn grace still active), stop frog at surface
        if (!frog.sinking && !frog.grounded && frog.y >= WATER_Y) {
          frog.y = WATER_Y - 2; frog.vy = 0; frog.vx = 0;
        }
      } else {
        // Invincible — bounce
        frog.y = WATER_Y - 4; frog.vy = -4;
      }
    }

    // Sinking water animation (non-fatal water damage — wait for splash before respawn)
    if (frog.sinking) {
      const t = Math.min(1, (frame - frog.sinking.startFrame) / frog.sinking.duration);
      if (t >= 1) {
        // Respawn now — fade in so frog doesn't pop into view
        const rp = pads[frog.sinking.padIdx];
        frog.x = rp.x; frog.y = rp.y - 23;
        frog.vx = 0; frog.vy = 0; frog.alpha = 1;
        frog.grounded = true; frog.dead = false;
        frog.sqX = 1; frog.sqY = 1; frog.onIce = false;
        frog.sinking = null;
      } else {
        frog.y = WATER_Y + t * 22;
        frog.alpha = Math.max(0, 1 - t * 2.2);
      }
    }

    // Prevent the pads array from growing forever. Old pads behind the frog
    // were never removed, so long sessions built up thousands of pads that
    // got ticked/drawn every frame, tanking the framerate (and causing the
    // landing-time stutter/"flashing"). Keep a generous buffer behind curPad
    // and drop the rest. Skip while sinking so the saved padIdx stays valid.
    if (curPad > 40 && !frog.sinking) {
      const drop = curPad - 20;
      pads.splice(0, drop);
      curPad -= drop;
    }

    // Draw world — reset globalAlpha before each draw step to prevent any alpha leak
    ctx.globalAlpha = 1; pads.forEach(drawPad);
    ctx.globalAlpha = 1; drawBugs();
    ctx.globalAlpha = 1; tickParts();
    ctx.globalAlpha = 1; drawGators();
    ctx.globalAlpha = 1; drawTrail();
    if (frog.sinking) {
      ctx.globalAlpha = 1; drawWaterRipples(waterHitWX - camX, WATER_Y);
      ctx.save();
      ctx.beginPath(); ctx.rect(0, 0, W, WATER_Y + 6); ctx.clip();
      ctx.globalAlpha = 1; drawFrog();
      ctx.restore();
    } else {
      ctx.globalAlpha = 1; drawFrog();
    }
    ctx.globalAlpha = 1; drawHUD();

  } else if (gs === 'menu') {
    drawMenu();
  } else {
    // Dead / win state
    if (Date.now() - gameEndTime > AUTO_MENU_DELAY) { gs = 'menu'; menuPage = 'main'; }
    if (pads) { ctx.globalAlpha = 1; pads.forEach(drawPad); }
    ctx.globalAlpha = 1; tickParts();
    ctx.globalAlpha = 1; drawGators();
    if (deathType === 'win' && frog) {
      // Win: draw frog on pad BEFORE the overlay so buttons show on top
      ctx.globalAlpha = 1; drawFrog();
    }
    // Overlay (dark tint + text + buttons)
    ctx.globalAlpha = 1; drawOver();
    if (frog && deathType !== 'win') {
      if (deathType === 'water' || deathType === 'eaten') {
        frog.y = Math.min(frog.y + 3.5, WATER_Y + 62);
        ctx.globalAlpha = 1; drawWaterRipples(waterHitWX - camX, WATER_Y);
        ctx.save();
        ctx.beginPath(); ctx.rect(0, 0, W, WATER_Y + 6); ctx.clip();
        ctx.globalAlpha = 1; drawFrog(); ctx.restore();
      } else { frogTick(); ctx.globalAlpha = 1; drawFrog(); }
    }
  }
}

gs = 'menu';
loop();

</script>

</body>
