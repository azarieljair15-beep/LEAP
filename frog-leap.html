<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Frog Leap</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; touch-action:none; }
html, body {
  width:100%; height:100%; overflow:hidden;
  background: radial-gradient(ellipse at 50% 40%, #0d1f0d 0%, #050e05 60%, #020508 100%);
}
body { display:flex; justify-content:center; align-items:center; }
canvas {
  display:block;
  height: 100vh;
  width: auto;
  max-width: 100vw;
}
/* ── Auth overlay ──────────────────────────── */
#auth-overlay {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at 50% 40%, #0a1a0a 0%, #030903 60%, #010305 100%);
  z-index: 999;
}
#auth-overlay.hidden { display: none; }
#auth-box {
  background: rgba(4,18,4,0.96);
  border: 1.5px solid #1e5a1e;
  border-radius: 20px;
  padding: 36px 38px 32px;
  width: min(340px, 90vw);
  font-family: Arial, sans-serif;
  box-shadow: 0 0 60px rgba(40,160,40,0.12);
}
#auth-logo {
  text-align: center;
  font-size: 38px;
  font-weight: 900;
  color: #3de83d;
  letter-spacing: 3px;
  margin-bottom: 4px;
}
#auth-subtitle {
  text-align: center;
  color: #4a8a4a;
  font-size: 13px;
  margin-bottom: 22px;
}
#auth-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 22px;
}
#auth-tabs button {
  flex: 1;
  padding: 9px 0;
  border: 1.5px solid #1e5a1e;
  border-radius: 12px;
  background: transparent;
  color: #5a9a5a;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  font-family: Arial, sans-serif;
}
#auth-tabs button.active {
  background: #1a5a1a;
  color: #80ff80;
  border-color: #2a8a2a;
}
#auth-box input {
  width: 100%;
  padding: 12px 14px;
  margin-bottom: 12px;
  background: rgba(20,50,20,0.7);
  border: 1.5px solid #1e5a1e;
  border-radius: 11px;
  color: #c8f0c8;
  font-size: 15px;
  font-family: Arial, sans-serif;
  outline: none;
  transition: border-color 0.15s;
}
#auth-box input:focus { border-color: #3ab03a; }
#auth-box input::placeholder { color: #3a6a3a; }
#auth-err {
  min-height: 20px;
  color: #ff6060;
  font-size: 13px;
  text-align: center;
  margin-bottom: 10px;
}
#auth-submit {
  width: 100%;
  padding: 13px;
  background: #1e7a1e;
  border: none;
  border-radius: 14px;
  color: #fff;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  font-family: Arial, sans-serif;
  transition: background 0.15s;
}
#auth-submit:hover { background: #2a9a2a; }
#auth-submit:disabled { background: #1a4a1a; color: #4a7a4a; cursor: default; }
#auth-footer {
  text-align: center;
  color: #3a6a3a;
  font-size: 12px;
  margin-top: 14px;
}
</style>
</head>

async function sbGet(path) {
  const r = await fetch(SB_URL + path, { headers: SB_HDR });
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.message || e.hint || 'Request failed'); }
  return r.json();
}
async function sbPost(path, body) {
  const r = await fetch(SB_URL + path, { method:'POST', headers: {...SB_HDR, 'Prefer':'return=representation'}, body: JSON.stringify(body) });
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.message || e.hint || 'Request failed'); }
  return r.json();
}
async function sbPatch(path, body) {
  const r = await fetch(SB_URL + path, { method:'PATCH', headers: SB_HDR, body: JSON.stringify(body) });
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.message || e.hint || 'Request failed'); }
}

// SHA-256 hash (client-side, never sends plaintext)
async function hashPw(pw) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode('fl-' + pw));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// Apply a Supabase profile row to game state
function applyProfile(p) {
  if (p.best_score    > 0)   best             = p.best_score;
  if (p.lily_pads_total > 0) lilyPadsTotal     = p.lily_pads_total;
  if (p.lily_pads_balance !== undefined && p.lily_pads_balance !== null)
                              lilyPadsBalance   = p.lily_pads_balance;
  if (p.games_won     > 0)   gamesWon          = p.games_won;
  if (p.win_threshold >= 30) WIN               = p.win_threshold === null ? Infinity : p.win_threshold;
  if (p.equipped_skin)       equippedSkin      = p.equipped_skin;
  if (p.equipped_accessory  !== undefined) equippedAccessory  = p.equipped_accessory  || '';
  if (p.equipped_accessory2 !== undefined) equippedAccessory2 = p.equipped_accessory2 || '';
  if (p.equipped_trail      !== undefined) equippedTrail      = p.equipped_trail      || '';
  if (p.equipped_bundle     !== undefined) equippedBundle     = p.equipped_bundle     || '';
  if (Array.isArray(p.owned_accessories)) ownedAccessories = p.owned_accessories;
  if (Array.isArray(p.owned_trails))      ownedTrails      = p.owned_trails;
  if (Array.isArray(p.owned_bundles))     ownedBundles     = p.owned_bundles;
}

// Save game state up to Supabase (debounced, fire-and-forget)

function scheduleCloudSync() {
  if (!currentUser) return;
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(() => {
    sbPatch(`/rest/v1/profiles?id=eq.${encodeURIComponent(currentUser.id)}`, {
      best_score:          best,
      lily_pads_total:     lilyPadsTotal,
      lily_pads_balance:   lilyPadsBalance,
      games_won:           gamesWon,
      win_threshold:       WIN === Infinity ? null : WIN,
      equipped_skin:       equippedSkin,
      equipped_accessory:  equippedAccessory,
      equipped_accessory2: equippedAccessory2,
      equipped_trail:      equippedTrail,
      equipped_bundle:     equippedBundle,
      owned_accessories:   ownedAccessories,
      owned_trails:        ownedTrails,
      owned_bundles:       ownedBundles,
      updated_at:          new Date().toISOString(),
    }).catch(() => {}); // silent fail; localStorage is still the safety net
  }, 1500);
}

function authSetErr(msg) {
  document.getElementById('auth-err').textContent = msg;
}
function authSetLoading(on) {
  const btn = document.getElementById('auth-submit');
  btn.disabled = on;
  btn.textContent = on ? 'Please wait…' : (authMode === 'login' ? 'Log In' : 'Create Account');
}

function switchTab(mode) {
  authMode = mode;
  document.getElementById('tab-login').classList.toggle('active', mode === 'login');
  document.getElementById('tab-signup').classList.toggle('active', mode === 'signup');
  document.getElementById('auth-submit').textContent = mode === 'login' ? 'Log In' : 'Create Account';
  document.getElementById('auth-footer').innerHTML = mode === 'login'
    ? 'No account? <span id="auth-guest" style="color:#5ab05a;cursor:pointer;text-decoration:underline" onclick="guestPlay()">Play as guest</span>'
    : 'Already have one? <span style="color:#5ab05a;cursor:pointer;text-decoration:underline" onclick="switchTab(\'login\')">Log In</span>';
  authSetErr('');
}

async function authSubmit() {
  const user = document.getElementById('auth-user').value.trim();
  const pass = document.getElementById('auth-pass').value;
  authSetErr('');

  if (!user) { authSetErr('Enter a username.'); return; }
  if (user.length < 3) { authSetErr('Username must be at least 3 characters.'); return; }
  if (!/^[a-zA-Z0-9_]+$/.test(user)) { authSetErr('Letters, numbers, and _ only.'); return; }
  if (!pass) { authSetErr('Enter a password.'); return; }
  if (pass.length < 6) { authSetErr('Password must be at least 6 characters.'); return; }

  authSetLoading(true);
  try {
    if (authMode === 'signup') {
      // Check username availability
      const existing = await sbGet(`/rest/v1/profiles?username=eq.${encodeURIComponent(user)}&select=id`);
      if (existing.length > 0) { authSetErr('That username is taken.'); authSetLoading(false); return; }
      const hash = await hashPw(pass);
      const rows = await sbPost('/rest/v1/profiles', { username: user, password_hash: hash });
      const profile = rows[0];
      currentUser = { id: profile.id, username: profile.username };
    } else {
      // Login
      const rows = await sbGet(`/rest/v1/profiles?username=eq.${encodeURIComponent(user)}&select=*`);
      if (rows.length === 0) { authSetErr('Username not found.'); authSetLoading(false); return; }
      const profile = rows[0];
      const hash = await hashPw(pass);
      if (hash !== profile.password_hash) { authSetErr('Incorrect password.'); authSetLoading(false); return; }
      currentUser = { id: profile.id, username: profile.username };
      applyProfile(profile);
    }
    // Persist session
    localStorage.setItem('frogLeap_session', JSON.stringify(currentUser));
    hideAuthOverlay();
  } catch (err) {
    authSetErr(err.message || 'Connection error. Try again.');
    authSetLoading(false);
  }
}

function guestPlay() {
  currentUser = null;
  localStorage.removeItem('frogLeap_session');
  hideAuthOverlay();
}

function hideAuthOverlay() {
  document.getElementById('auth-overlay').classList.add('hidden');
}

function showAuthOverlay() {
  document.getElementById('auth-overlay').classList.remove('hidden');
  document.getElementById('auth-err').textContent = '';
  document.getElementById('auth-user').value = '';
  document.getElementById('auth-pass').value = '';
  authSetLoading(false);
  switchTab('login');
  setTimeout(() => document.getElementById('auth-user').focus(), 50);
}

function doLogout() {
  currentUser = null;
  localStorage.removeItem('frogLeap_session');
  menuPage = 'main';
  showAuthOverlay();
}

// ── Accessory equip helper ────────────────────
function equipAccessory(id) {
  if (equippedBundle === 'cyborg' && !CYBORG_ALLOWED.has(id)) return;
  if (equippedAccessory === id) { equippedAccessory = null; equippedAccessory2 = null; saveProgress(); return; }
  if (equippedAccessory2 === id) { equippedAccessory2 = null; saveProgress(); return; }
  const canStack = STACK_PAIRS.some(p => p[0] === equippedAccessory && p[1] === id);
  if (canStack) { equippedAccessory2 = id; }
  else { equippedAccessory = id; equippedAccessory2 = null; }
  saveProgress();
}

  try {
    localStorage.setItem('frogLeap_v3', JSON.stringify({
      best, lilyPadsTotal, lilyPadsBalance,
      equippedSkin, equippedAccessory, equippedAccessory2, equippedTrail,
      equippedBundle, ownedAccessories, ownedTrails, ownedBundles, gamesWon, WIN
    }));
  } catch(e) {}
  scheduleCloudSync();
}
function loadProgress() {
  try {
    const src = localStorage.getItem('frogLeap_v3') || localStorage.getItem('frogLeap_v2') || '{}';
    const d = JSON.parse(src);
    if (d.best)              best = d.best;
    if (d.lilyPadsTotal)     lilyPadsTotal = d.lilyPadsTotal;
    if (d.lilyPadsBalance !== undefined) lilyPadsBalance = d.lilyPadsBalance;
    if (d.equippedSkin)      equippedSkin = d.equippedSkin;
    if (d.equippedAccessory !== undefined) equippedAccessory = d.equippedAccessory;

    if (Array.isArray(d.ownedTrails)) ownedTrails = d.ownedTrails;
    if (Array.isArray(d.ownedBundles)) ownedBundles = d.ownedBundles;
    if (d.gamesWon) gamesWon = d.gamesWon;
    if (d.WIN && d.WIN >= 30) WIN = d.WIN === null ? Infinity : d.WIN;

}

// ── Color helpers ─────────────────────────────
function hexToRgb(hex) {
  if (!hex || !hex.startsWith('#') || hex.length < 7) return [80,200,80];
  return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}
function skinColRgba(prop, alpha) {
  const c = getSkinProp(prop);
  if (c.startsWith('#')) { const [r,g,b] = hexToRgb(c); return `rgba(${r},${g},${b},${alpha})`; }
  return c.replace('hsl(','hsla(').replace(')',`,${alpha})`);
}

// ── Skin helpers ──────────────────────────────
function getSkinProp(prop, overrideSkin) {
  const id = overrideSkin !== undefined ? overrideSkin : equippedSkin;
  if (id === 'rainbow') {
    const baseH = { body:0, head:40, belly:80, leg:320, arm:280, eye:120, ol:200 };
    const h = ((frame * 2) + (baseH[prop] || 0)) % 360;
    const l = prop === 'belly' ? 72 : prop === 'eye' ? 38 : 45;
    return `hsl(${h},80%,${l}%)`;
  }
  const sk = SKINS.find(s => s.id === id) || SKINS[0];
  return sk[prop] || SKINS[0][prop];
}
function skinOwned(id) {
  const sk = SKINS.find(s => s.id === id);
  return sk ? lilyPadsTotal >= sk.threshold : false;

// Draw a gnarled dead swamp tree (bare branches)
function drawGnarledTree(x, baseY, h, col) {
  ctx.strokeStyle = col; ctx.lineCap = 'round';
  ctx.lineWidth = 2.8;
  ctx.beginPath();
  ctx.moveTo(x, baseY);
  ctx.quadraticCurveTo(x + 4, baseY - h*0.55, x - 3, baseY - h);
  ctx.stroke();

  [[0.42, 1, 14, -6], [0.58, -1, 16, -8], [0.72, 1, 10, -5]].forEach(([yf, dir, len, dy]) => {
    const bx = x + (yf*8 - 4), by = baseY - h*yf;

    ctx.quadraticCurveTo(bx + dir*len*0.5, by + dy, bx + dir*len, by + dy*0.4);
    ctx.stroke();

  ctx.strokeStyle = col; ctx.lineWidth = 1.1; ctx.lineCap = 'round';
  const strands = 5;
  for (let i = 0; i < strands; i++) {

    ctx.fillStyle = hg; ctx.fillRect(0, HORIZON - 40, W, 70);
  }

  // ── Stars ────────────────────────────────────
  if (nA > 0 && currentEvent !== 'volcanic') {
    STARS.forEach(s => {
      s.tw += 0.012;
      const br = 0.45 + Math.sin(s.tw) * 0.55;
      ctx.globalAlpha = nA * br * 0.9;
      ctx.fillStyle = '#e8f0d8'; // slightly warm/green tint through swamp air
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;
  }

  // ── Moon ─────────────────────────────────────
  const mx = 340, my = 55;
  if (nA > 0 && currentEvent !== 'volcanic') {
    ctx.globalAlpha = nA;
    // Eerie greenish moon halo through swamp mist
    const mhalo = ctx.createRadialGradient(mx, my, 0, mx, my, 62);
    mhalo.addColorStop(0, 'rgba(180,210,155,0.22)');
    mhalo.addColorStop(0.5, 'rgba(140,180,110,0.08)');
    mhalo.addColorStop(1, 'rgba(80,120,60,0)');
    ctx.fillStyle = mhalo; ctx.beginPath(); ctx.arc(mx, my, 62, 0, Math.PI*2); ctx.fill();
    const mg = ctx.createRadialGradient(mx, my, 0, mx, my, 24);
    mg.addColorStop(0, 'rgba(240,248,218,1)');
    mg.addColorStop(0.72, 'rgba(220,235,192,0.92)');
    mg.addColorStop(1, 'rgba(180,200,148,0)');
    ctx.fillStyle = mg; ctx.beginPath(); ctx.arc(mx, my, 24, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  // ── Sun (day, hazy through swamp atmosphere) ─
  const sunA = Math.max(0, 1 - nA * 2);
  if (sunA > 0 && currentEvent !== 'volcanic') {
    const sunX = 68, sunY = 52;
    ctx.globalAlpha = sunA * (currentEvent === 'winter' ? 0.7 : 0.88);
    const shalo = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 52);
    shalo.addColorStop(0, 'rgba(255,238,160,0.28)');
    shalo.addColorStop(1, 'rgba(200,175,70,0)');
    ctx.fillStyle = shalo; ctx.beginPath(); ctx.arc(sunX, sunY, 52, 0, Math.PI*2); ctx.fill();
    const sg = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 22);
    sg.addColorStop(0, 'rgba(255,245,175,1)');
    sg.addColorStop(0.55, 'rgba(255,212,82,0.88)');
    sg.addColorStop(1, 'rgba(215,165,35,0)');
    ctx.fillStyle = sg; ctx.beginPath(); ctx.arc(sunX, sunY, 22, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  }

  // ── Volcano (volcanic event) ─────────────────
  if (currentEvent === 'volcanic') {
    // Anchored to the camera (not a fixed world position) so it never
    // scrolls off-screen and disappears for the rest of the event.
    const vsx = camX + W - 110;
    {
      // Ash cloud behind volcano
      const ashg = ctx.createRadialGradient(vsx, HORIZON - 90, 0, vsx, HORIZON - 90, 120);
      ashg.addColorStop(0, 'rgba(60,30,10,0.55)');
      ashg.addColorStop(1, 'rgba(30,10,5,0)');
      ctx.fillStyle = ashg; ctx.beginPath(); ctx.arc(vsx, HORIZON - 90, 120, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#2e1205';
      ctx.beginPath();
      ctx.moveTo(vsx-90,HORIZON); ctx.lineTo(vsx-22,HORIZON-132);
      ctx.lineTo(vsx,HORIZON-154); ctx.lineTo(vsx+22,HORIZON-132);
      ctx.lineTo(vsx+90,HORIZON); ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#4a1a08';
      ctx.beginPath();
      ctx.moveTo(vsx-65,HORIZON); ctx.lineTo(vsx-16,HORIZON-122);
      ctx.lineTo(vsx+65,HORIZON); ctx.closePath(); ctx.fill();
      // Lava glow at crater
      const lvg = ctx.createRadialGradient(vsx, HORIZON-152, 0, vsx, HORIZON-152, 38);
      lvg.addColorStop(0, 'rgba(255,140,0,1)');
      lvg.addColorStop(0.4, 'rgba(255,80,0,0.7)');
      lvg.addColorStop(1, 'rgba(200,20,0,0)');
      ctx.fillStyle = lvg; ctx.beginPath(); ctx.arc(vsx, HORIZON-152, 38, 0, Math.PI*2); ctx.fill();
      // Lava glow on water (arc only, no full fillRect)
      ctx.save(); ctx.globalAlpha = 0.20;
      const lwg = ctx.createRadialGradient(vsx, HORIZON+50, 0, vsx, HORIZON+50, 200);
      lwg.addColorStop(0, 'rgba(255,80,0,1)'); lwg.addColorStop(1, 'rgba(200,20,0,0)');
      ctx.fillStyle = lwg; ctx.beginPath(); ctx.arc(vsx, HORIZON+50, 200, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }

  // ── Background parallax shift ─────────────────
  const bgShift = -camX / 3;
  if (frog && !frog.grounded) frozenCamX = camX;

  // ── Far cypress treeline (two depth layers) ──
  // Far layer — shorter, desaturated
  const farCol  = currentEvent === 'spring'   ? '#1a5a1e' :
                  currentEvent === 'volcanic'  ? '#1e0c04' :
                  currentEvent === 'winter'    ? '#223028' : '#0e1e0e';
  const nearCol = currentEvent === 'spring'   ? '#122e14' :
                  currentEvent === 'volcanic'  ? '#160a02' :
                  currentEvent === 'winter'    ? '#18221a' : '#0a150a';
  // Far layer
  for (let i = 0; i < CYPRESS_TREES.length; i++) {
    const ct = CYPRESS_TREES[i];
    if (ct.layer === 0) {
      const sx = ((ct.x + bgShift) % (W + ct.w*2) + W + ct.w*2) % (W + ct.w*2) - ct.w;
      if (sx > -50 && sx < W + 50) drawCypress(sx, HORIZON, ct.h * 0.65, ct.w * 0.72, farCol);
    }
  }
  // Near layer + gnarled trees
  for (let i = 0; i < CYPRESS_TREES.length; i++) {
    const ct = CYPRESS_TREES[i];
    if (ct.layer === 1) {
      const sx = ((ct.x + bgShift) % (W + ct.w*2) + W + ct.w*2) % (W + ct.w*2) - ct.w;
      if (sx > -50 && sx < W + 50) {
        drawCypress(sx, HORIZON, ct.h, ct.w, nearCol);
        // Spanish moss on some near trees (not volcanic/winter)
        if (currentEvent !== 'volcanic' && currentEvent !== 'winter' && ct.w > 12) {
          drawMoss(sx, HORIZON - ct.h * 0.62, ct.w * 0.8, nearCol);
        }
      }
    }
  }
  // Gnarled dead trees scattered in
  for (let i = 0; i < GNARLED_TREES.length; i++) {
    const gt = GNARLED_TREES[i];
    const gCol = currentEvent === 'volcanic' ? '#2a0e04' : currentEvent === 'winter' ? '#2a3530' : '#161e10';
    const gsx = ((gt.x + bgShift) % (W + 60) + W + 60) % (W + 60) - 30;
    drawGnarledTree(gsx, HORIZON, gt.h, gCol);
  }
  // Spring: blossoms on treeline
  if (currentEvent === 'spring') {
    for (let i = 0; i < CYPRESS_TREES.length; i++) {
      const ct = CYPRESS_TREES[i];
      if (ct.layer === 1 && ct.w > 11) {
        const bsx = ((ct.x + bgShift) % (W + ct.w*2) + W + ct.w*2) % (W + ct.w*2) - ct.w;
        if (bsx > -50 && bsx < W + 50) {
          ctx.fillStyle = `rgba(255,180,210,${0.55 + Math.sin(ct.x * 0.22 + wv*0.01)*0.25})`;
          ctx.beginPath(); ctx.arc(bsx, HORIZON - ct.h * 0.85, ct.w * 0.45, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = `rgba(255,220,230,0.3)`;
          ctx.beginPath(); ctx.arc(bsx + ct.w*0.2, HORIZON - ct.h * 0.68, ct.w * 0.3, 0, Math.PI*2); ctx.fill();
        }
      }
    }
  }

  // ── Swamp shore / land bank behind the treeline ─
  if (currentEvent !== 'volcanic') {
    const bankCol  = currentEvent === 'winter' ? '#1e2e26' : currentEvent === 'spring' ? '#1e4020' : '#141e10';
    const bankCol2 = currentEvent === 'winter' ? '#28402e' : currentEvent === 'spring' ? '#285230' : '#1a2814';
    // Bank polygons extend 20px off-screen on each side so no corner is visible
    ctx.fillStyle = bankCol;
    ctx.beginPath(); ctx.moveTo(-20, HORIZON);
    for (let bx = -20; bx <= W + 20; bx += 18) {
      const wx = bx - bgShift;
      const by = HORIZON + 2 + Math.sin(wx * 0.09 + 1.4) * 5 + Math.sin(wx * 0.04) * 8;
      ctx.lineTo(bx, by);
    }
    ctx.lineTo(W + 20, HORIZON + 30); ctx.lineTo(-20, HORIZON + 30); ctx.closePath(); ctx.fill();
    ctx.fillStyle = bankCol2;
    ctx.beginPath(); ctx.moveTo(-20, HORIZON + 5);
    for (let bx = -20; bx <= W + 20; bx += 12) {
      const wx = bx - bgShift;
      const by = HORIZON + 8 + Math.sin(wx * 0.13 + 2.2) * 4 + Math.sin(wx * 0.05) * 5;
      ctx.lineTo(bx, by);
    }
    ctx.lineTo(W + 20, HORIZON + 22); ctx.lineTo(-20, HORIZON + 22); ctx.closePath(); ctx.fill();
    // Grass tufts — tiled and scrolled with camera
    const grassCol = currentEvent === 'spring' ? '#3a7228' : '#2a4e1a';
    const gStep = 14, gOff = ((bgShift + 8) % gStep + gStep) % gStep;
    for (let gx = gOff; gx < W + gStep; gx += gStep) {
      const wx = gx - bgShift;
      const baseY = HORIZON + 9 + Math.sin(wx * 0.13 + 2.2) * 4;
      const sway = Math.sin(wv * 0.02 + wx * 0.25) * 1.5;
      ctx.strokeStyle = grassCol; ctx.lineWidth = 1.2; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(gx, baseY);
      ctx.quadraticCurveTo(gx + sway, baseY - 7, gx + sway * 1.5, baseY - 10); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(gx + 4, baseY - 1);
      ctx.quadraticCurveTo(gx + 4 + sway * 0.8, baseY - 6, gx + 5 + sway, baseY - 8); ctx.stroke();
    }
  }

  // ── Water (murky swamp) ──────────────────────
  const ws = interpStops(WATER_STOPS, tod);
  let waterTop, waterBot;
  if (currentEvent === 'volcanic') {
    waterTop = lerpC(ws.top, [100,28,6], 0.62);
    waterBot = lerpC(ws.bot, [65,14,3], 0.62);
  } else if (currentEvent === 'winter') {
    waterTop = [128, 165, 175]; waterBot = [88, 128, 145];
  } else if (currentEvent === 'spring') {
    waterTop = lerpC(ws.top, [28,78,42], 0.38);
    waterBot = lerpC(ws.bot, [14,48,24], 0.38);
  } else {
    waterTop = ws.top; waterBot = ws.bot;
  }
  const wg = ctx.createLinearGradient(0, HORIZON, 0, H);
  wg.addColorStop(0,   rgb(waterTop));
  wg.addColorStop(0.5, rgb(lerpC(waterTop, waterBot, 0.75)));
  wg.addColorStop(1,   rgb(waterBot));
  ctx.fillStyle = wg; ctx.fillRect(0, HORIZON, W, H - HORIZON);

  // ── Algae surface patches ─────────────────────
  if (currentEvent !== 'winter' && currentEvent !== 'volcanic') {
    ctx.save();
    for (let i = 0; i < ALGAE_PATCHES.length; i++) {
      const a = ALGAE_PATCHES[i];
      const ax = ((a.x + bgShift) % (W + 300) + W + 300) % (W + 300) - 100;
      ctx.globalAlpha = a.alpha * (currentEvent === 'spring' ? 1.3 : 1);
      ctx.fillStyle = a.col;
      ctx.beginPath(); ctx.ellipse(ax, a.y, a.rx, a.ry, a.rot, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }


  // ── Ground mist / fog layers ─────────────────
  if (currentEvent !== 'volcanic') {
    const baseA = currentEvent === 'winter' ? 0.30 : 0.18 + Math.sin(wv*0.007)*0.05;
    // Main fog band at horizon
    const fg = ctx.createLinearGradient(0, HORIZON - 8, 0, HORIZON + 60);
    fg.addColorStop(0,   'rgba(120,155,108,0)');
    fg.addColorStop(0.28, `rgba(118,148,105,${baseA * 0.65})`);
    fg.addColorStop(0.62, `rgba(105,138,92,${baseA * 0.40})`);
    fg.addColorStop(1,   'rgba(92,125,80,0)');
    ctx.fillStyle = fg; ctx.fillRect(0, HORIZON - 8, W, 68);
    // Individual wisp blobs
    for (let i = 0; i < FOG_WISPS.length; i++) {
      const fw = FOG_WISPS[i];
      fw.x += fw.dx;
      if (fw.x > W + 90) fw.x = -90; if (fw.x < -90) fw.x = W + 90;
      const wy = fw.y + Math.sin(wv * fw.freq + fw.phase) * 6;
      const wa = baseA * fw.alpha * (0.55 + Math.sin(wv * 0.009 + fw.phase) * 0.28);
      if (wa < 0.01) continue;
      ctx.save(); ctx.globalAlpha = wa;
      const wfg = ctx.createRadialGradient(fw.x, wy, 0, fw.x, wy, fw.rx);
      wfg.addColorStop(0, 'rgba(135,162,118,1)'); wfg.addColorStop(1, 'rgba(100,135,85,0)');
      ctx.fillStyle = wfg;
      ctx.beginPath(); ctx.ellipse(fw.x, wy, fw.rx, fw.ry, 0, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }
  // Volcanic ash haze over water
  if (currentEvent === 'volcanic') {
    const ag = ctx.createLinearGradient(0, HORIZON, 0, HORIZON + 80);
    ag.addColorStop(0,  `rgba(80,30,8,${0.18 + Math.sin(wv*0.012)*0.06})`);
    ag.addColorStop(1,  'rgba(40,12,3,0)');
    ctx.fillStyle = ag; ctx.fillRect(0, HORIZON, W, 80);
  }

  // ── Cattails / reeds ─────────────────────────
  if (currentEvent !== 'winter') {
    const ctBaseA = currentEvent === 'volcanic' ? 0.55 : 0.9;
    for (let i = 0; i < CATTAILS.length; i++) {
      const ct = CATTAILS[i];
      const cx = ((ct.x + bgShift) % (W + 120) + W + 120) % (W + 120) - 60;
      const sway = Math.sin(wv * 0.022 + ct.phase) * 3.5;
      ctx.save(); ctx.globalAlpha = ctBaseA;
      // Stem
      ctx.strokeStyle = currentEvent === 'spring' ? '#4a7a28' : '#3a5520';
      ctx.lineWidth = ct.thick;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(cx, HORIZON + ct.height + 10);
      ctx.quadraticCurveTo(cx + sway * 0.45, HORIZON + ct.height * 0.5, cx + sway, HORIZON + 4);
      ctx.stroke();
      // Cattail pod
      ctx.fillStyle = '#2e1808';
      ctx.beginPath(); ctx.ellipse(cx + sway, HORIZON + 4, ct.thick * 1.7, ct.thick * 4.2, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#4a2810';
      ctx.beginPath(); ctx.ellipse(cx + sway, HORIZON + 2, ct.thick * 1.2, ct.thick * 2.5, 0, 0, Math.PI*2); ctx.fill();
      // Leaf blade
      if (ct.hasLeaf) {
        ctx.strokeStyle = currentEvent === 'spring' ? '#58922e' : '#446624';
        ctx.lineWidth = 1.4;
        ctx.beginPath();
        ctx.moveTo(cx + sway * 0.4, HORIZON + ct.height * 0.55);
        ctx.quadraticCurveTo(cx + sway + 20, HORIZON + ct.height * 0.28, cx + sway + 26, HORIZON + ct.height * 0.15);
        ctx.stroke();
      }
      ctx.restore();
    }
  }


  // ── Background decorative lily pads ─────────
  if (currentEvent !== 'volcanic') {
    const bgPadCol  = currentEvent === 'winter' ? '#2a4838' : currentEvent === 'spring' ? '#3a8830' : '#2e6228';
    const bgPadCol2 = currentEvent === 'winter' ? '#3a5e48' : currentEvent === 'spring' ? '#52a840' : '#3a7a34';
    ctx.save();
    for (let i = 0; i < BG_LILY_PADS.length; i++) {
      const bl = BG_LILY_PADS[i];
      // Slow parallax drift (closer to bg = slower)
      const _range = W + bl.r * 3 + 360;
      const frogCamX = frog ? frog.x - 170 : camX;
      const bsx = ((bl.x - frogCamX) % _range + _range) % _range - bl.r * 1.5;
      ctx.globalAlpha = 1;
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.28)';
      ctx.beginPath(); ctx.ellipse(bsx + 2, bl.y + 4, bl.r * 0.92, bl.r * 0.28, 0, 0, Math.PI*2); ctx.fill();
      // Pad
      ctx.fillStyle = bgPadCol;
      ctx.beginPath(); ctx.ellipse(bsx, bl.y, bl.r, bl.r * 0.32, 0, 0, Math.PI*2); ctx.fill();
      // Highlight top
      ctx.fillStyle = bgPadCol2;
      ctx.beginPath(); ctx.ellipse(bsx - bl.r*0.08, bl.y - bl.r*0.04, bl.r * 0.72, bl.r * 0.18, -0.1, 0, Math.PI*2); ctx.fill();
      // Notch line
      ctx.strokeStyle = bgPadCol; ctx.lineWidth = 0.8;
      ctx.beginPath(); ctx.moveTo(bsx, bl.y - bl.r*0.3); ctx.lineTo(bsx, bl.y + bl.r*0.3); ctx.stroke();
      // Optional small flower for spring
      if (currentEvent === 'spring' && bl.r > 12) {
        ctx.fillStyle = 'rgba(255,200,220,0.7)';
        ctx.beginPath(); ctx.arc(bsx + bl.r*0.25, bl.y - bl.r*0.12, bl.r*0.18, 0, Math.PI*2); ctx.fill();
      }
    }
    ctx.restore();
  }

  // ── Ice surface (winter event) ───────────────
  if (currentEvent === 'winter') {
    // Frost / snow on water surface
    const iceG = ctx.createLinearGradient(0, WATER_Y - 8, 0, WATER_Y + 16);
    iceG.addColorStop(0,   'rgba(210,240,255,0.70)');
    iceG.addColorStop(0.5, 'rgba(190,225,248,0.45)');
    iceG.addColorStop(1,   'rgba(160,205,235,0)');
    ctx.fillStyle = iceG; ctx.fillRect(0, WATER_Y - 8, W, 24);
    ctx.strokeStyle = 'rgba(210,238,255,0.85)'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.moveTo(0, WATER_Y - 2); ctx.lineTo(W, WATER_Y - 2); ctx.stroke();
    // Ice crack network
    ctx.strokeStyle = 'rgba(160,210,240,0.38)'; ctx.lineWidth = 0.7;
    for (let ix = 30; ix < W; ix += 100) {
      ctx.beginPath(); ctx.moveTo(ix, WATER_Y - 8);
      ctx.lineTo(ix + 18, WATER_Y); ctx.lineTo(ix + 32, WATER_Y - 5);
      ctx.lineTo(ix + 50, WATER_Y + 3); ctx.stroke();
    }
    // Snow particles
    while (snowParts.length < 70) {
      snowParts.push({ x:Math.random()*W, y:Math.random()*HORIZON, vy:0.5+Math.random()*1.5, vx:(Math.random()-0.5)*0.5, r:0.8+Math.random()*2.2 });
    }
    ctx.fillStyle = 'rgba(225,242,255,0.88)';
    snowParts.forEach(s => {
      s.y += s.vy; s.x += s.vx;
      if (s.y > HORIZON) { s.y = -4; s.x = Math.random()*W; }
      if (s.x < 0) s.x = W; if (s.x > W) s.x = 0;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
    });
  } else { snowParts = []; }

  // ── Moon reflection (greenish cast) ──────────
  if (nA > 0 && currentEvent !== 'volcanic') {
    const rip = Math.sin(wv * 0.055) * 7;
    for (let ry = 0; ry < 70; ry += 11) {
      const ww = Math.max(0, 5 + Math.sin(ry * 0.19 + wv * 0.038) * 10);
      ctx.save(); ctx.globalAlpha = nA * (0.18 - ry * 0.0022);
      ctx.fillStyle = '#d8e8c0'; // green-tinged reflection
      ctx.beginPath(); ctx.ellipse(mx + rip, HORIZON + 14 + ry, ww, 1.1, 0, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }

  // ── Fire embers drifting through the sky (volcanic event) ──
  if (currentEvent === 'volcanic') {
    while (emberParts.length < 24) {
      emberParts.push({
        x: Math.random() * W, y: HORIZON + 10 + Math.random() * 30,
        vy: -(0.3 + Math.random() * 0.6), vx: (Math.random() - 0.3) * 0.6,
        r: 1 + Math.random() * 2, life: Math.random() * 60, maxLife: 90 + Math.random() * 120,
        flick: Math.random() * Math.PI * 2
      });
    }
    emberParts.forEach(e => {
      e.x += e.vx; e.y += e.vy; e.life++; e.flick += 0.15;
      if (e.life > e.maxLife || e.y < HORIZON - 260) {
        e.y = HORIZON + 10 + Math.random() * 30; e.x = Math.random() * W;
        e.life = 0; e.maxLife = 90 + Math.random() * 120;
      }
      const fade = Math.min(1, e.life / 20) * Math.min(1, (e.maxLife - e.life) / 20);
      const flicker = 0.5 + Math.sin(e.flick) * 0.5;
      ctx.save(); ctx.globalAlpha = fade * (0.3 + flicker * 0.4);
      const eg = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, e.r * 3);
      eg.addColorStop(0, 'rgba(255,200,80,0.9)');
      eg.addColorStop(0.5, 'rgba(255,110,30,0.5)');
      eg.addColorStop(1, 'rgba(255,60,0,0)');
      ctx.fillStyle = eg; ctx.beginPath(); ctx.arc(e.x, e.y, e.r * 3, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    });
  } else if (emberParts.length) { emberParts = []; }

  // ── Steam rising off the water (volcanic event — lava-warmed swamp) ──
  if (currentEvent === 'volcanic') {
    while (steamParts.length < 20) {
      steamParts.push({
        x: Math.random() * W, y: WATER_Y - Math.random() * 10,
        vy: -(0.25 + Math.random() * 0.35), vx: (Math.random() - 0.5) * 0.15,
        r: 6 + Math.random() * 10, life: Math.random() * 80, maxLife: 100 + Math.random() * 100
      });
    }
    steamParts.forEach(s => {
      s.x += s.vx; s.y += s.vy; s.r += 0.04; s.life++;
      if (s.life > s.maxLife) {
        s.y = WATER_Y - Math.random() * 10; s.x = Math.random() * W;
        s.r = 6 + Math.random() * 10; s.life = 0; s.maxLife = 100 + Math.random() * 100;
      }
      const fade = Math.sin(Math.min(1, s.life / s.maxLife) * Math.PI);
      ctx.save(); ctx.globalAlpha = fade * 0.16;
      ctx.fillStyle = '#e8e0d8';
      ctx.beginPath(); ctx.ellipse(s.x, s.y, s.r, s.r * 0.55, 0, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    });
  } else if (steamParts.length) { steamParts = []; }

}

// ── Pad helpers ───────────────────────────────
function makePad(x, y, w) { return { x, y, baseY:y, w, st:0, t:-1 }; }
function padTick(p, i) {
  if (p.st < 1) return;
  if (currentEvent === 'winter') return; // frozen lake
  // Freeze pad timer while frog is balancing (spring=unlimited balance in frogTick)
  if (i === curPad && frog && frog.grounded && frog.balancing) return;
  p.t += 1/60;
  const wt = currentEvent === 'spring' ? WARN_T * 2.5 : WARN_T;
  const st = currentEvent === 'spring' ? SINK_T * 2 : SINK_T;
  if (p.st === 1 && p.t >= wt) p.st = 2;
  if (p.st === 2) {
    const s = (p.t - wt) / st;
    p.y = p.baseY + s * 80;
    if (s >= 1) { p.st = 3; p.y = p.baseY + 80; }
  }
}
function padActivate(p) { if (p.st === 0) { p.st = 1; p.t = 0; } }
function padAlpha(p) { 
  const wt = currentEvent === 'spring' ? WARN_T * 2.5 : WARN_T;
  const st = currentEvent === 'spring' ? SINK_T * 2 : SINK_T;
  if (p.st < 2) return 1; return Math.max(0, 1 - (p.t - wt) / st); 
}
function padTimeLeft(p) {
  const wt = currentEvent === 'spring' ? WARN_T * 2.5 : WARN_T;
  if (p.st === 0) return wt; if (p.st === 1) return Math.max(0, wt - p.t); return 0;
}
function drawPad(p) {
  const sx = p.x - camX;
  if (sx < -150 || sx > W + 150) return;
  const al = padAlpha(p);
  if (al <= 0) return;
  const r = p.w * (currentEvent === 'spring' ? 1.4 : currentEvent === 'winter' ? 0.70 : 1) / 2;

  // Identical colors to background lily pads
  const colMain  = currentEvent === 'winter' ? '#2a4838' : currentEvent === 'spring' ? '#3a8830' : '#2e6228';
  const colLight = currentEvent === 'winter' ? '#3a5848' : currentEvent === 'spring' ? '#52a840' : '#4a8840';

  ctx.save(); ctx.globalAlpha = al;
  // Shadow — same as bg pads
  ctx.fillStyle = 'rgba(0,0,0,0.28)';
  ctx.beginPath(); ctx.ellipse(sx + 2, p.y + 4, r * 0.92, r * 0.28, 0, 0, Math.PI*2); ctx.fill();
  // Main pad
  ctx.fillStyle = colMain;
  ctx.beginPath(); ctx.ellipse(sx, p.y, r, r * 0.32, 0, 0, Math.PI*2); ctx.fill();
  // Highlight
  ctx.fillStyle = colLight;
  ctx.beginPath(); ctx.ellipse(sx - r*0.08, p.y - r*0.04, r * 0.72, r * 0.18, -0.1, 0, Math.PI*2); ctx.fill();
  // Notch line
  ctx.strokeStyle = colMain; ctx.lineWidth = 0.8;
  ctx.beginPath(); ctx.moveTo(sx, p.y - r*0.3); ctx.lineTo(sx, p.y + r*0.3); ctx.stroke();
  // Spring flower
  if (currentEvent === 'spring') {
    ctx.fillStyle = 'rgba(255,200,220,0.7)';
    ctx.beginPath(); ctx.arc(sx + r*0.25, p.y - r*0.12, r*0.18, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
  // Warning ring
  if (p.st === 1) {
    const wt = currentEvent === 'spring' ? WARN_T * 2.5 : WARN_T;
    const urg = p.t / wt;
    ctx.save(); ctx.globalAlpha = Math.min(1, urg);
    ctx.strokeStyle = urg > 0.65 ? `rgb(255,${(88*(1-urg))|0},0)` : '#d0a020';
    ctx.lineWidth = 2 + urg * 2;
    ctx.beginPath(); ctx.ellipse(sx, p.y, r + 5, r * 0.32 + 4, 0, 0, Math.PI*2);
    ctx.stroke(); ctx.restore();
  }
}

// ── Frog drawing ──────────────────────────────
function makeFrog(x, y) {
  return {
    x, y, vx:0, vy:0, rot:0, sqX:1, sqY:1,
    grounded:true, dead:false, alpha:1,
    charging:false, charge:0, balancing:false, balanceT:0,
    tonguePhase:'idle', tongueProg:0, tongueAngle:0, tongueLen:0, tongueTarget:null,
    tongueCooldown:6, frownTimer:0,
    blinking:false, blinkFrame:0, blinkTimer:0,
    onIce: false
  };
}

function drawTrail() {
  if (!equippedTrail && equippedBundle !== 'cyborg') return;
  if (frogTrail.length < 3) return;
  for (let i = 0; i < frogTrail.length; i++) {
    const p = frogTrail[i];
    const t = i / frogTrail.length;
    const alpha = t * 0.55;
    const radius = t * 7 + 1;
    const sx = p.x - camX;
    if (sx < -20 || sx > W + 20) continue;
    if (equippedBundle === 'cyborg') {
      ctx.fillStyle = skinColRgba('body', alpha);
    } else if (equippedTrail === 'fire') {
      const r = t > 0.6 ? 255 : 255;
      const g2 = t > 0.6 ? 60 : t > 0.3 ? 130 : 220;
      const b2 = t > 0.6 ? 20 : 40;
      ctx.fillStyle = `rgba(${r},${g2},${b2},${alpha})`;
    } else if (equippedTrail === 'rainbow') {
      const h = (i / frogTrail.length * 360 + frame * 4) % 360;
      ctx.fillStyle = `hsla(${h},100%,60%,${alpha})`;
    } else {
      const cols = { red:'255,60,60', blue:'60,120,255', green:'60,220,80',
        yellow:'255,230,40', purple:'160,60,255', pink:'255,60,190', orange:'255,120,20' };
      ctx.fillStyle = `rgba(${cols[equippedTrail] || '255,255,255'},${alpha})`;
    }
    ctx.beginPath(); ctx.arc(sx, p.y, radius, 0, Math.PI*2); ctx.fill();
  }
}

function drawFrog() {
  const f = frog;
  if (f.alpha <= 0) return;
  const sx = f.x - camX, sy = f.y;
  ctx.save();
  ctx.globalAlpha = f.alpha;
  ctx.translate(sx, sy);
  ctx.rotate(f.rot);
  ctx.scale(f.sqX, f.sqY);

  const legCol  = getSkinProp('leg');
  const bodyCol = getSkinProp('body');
  const belCol  = getSkinProp('belly');
  const eyeCol  = getSkinProp('eye');
  const olCol   = getSkinProp('ol');

  // Back legs (behind body) — right side skipped for cyborg (drawn later in correct pose)
  const _cyborg = equippedBundle === 'cyborg';
  ctx.fillStyle = legCol;
  if (!f.grounded) {
    ctx.beginPath(); ctx.ellipse(-30,  1, 14,  8, -0.15, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(-33, 11, 12,  7,  0.05, 0, Math.PI*2); ctx.fill();
    if (!_cyborg) {
      ctx.beginPath(); ctx.ellipse( 30,  1, 14,  8,  0.15, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse( 33, 11, 12,  7, -0.05, 0, Math.PI*2); ctx.fill();
    }
  } else if (f.charging) {
    ctx.beginPath(); ctx.ellipse(-21,  8, 12,  9,  0.45, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(-18, 20, 10,  7,  0.10, 0, Math.PI*2); ctx.fill();
    if (!_cyborg) {
      ctx.beginPath(); ctx.ellipse( 21,  8, 12,  9, -0.45, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse( 18, 20, 10,  7, -0.10, 0, Math.PI*2); ctx.fill();
    }
  } else {
    ctx.beginPath(); ctx.ellipse(-24,  6, 13, 10,  0.30, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(-21, 18, 11,  8,  0.08, 0, Math.PI*2); ctx.fill();
    if (!_cyborg) {
      ctx.beginPath(); ctx.ellipse( 24,  6, 13, 10, -0.30, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse( 21, 18, 11,  8, -0.08, 0, Math.PI*2); ctx.fill();
    }
  }

  // Main body blob
  ctx.fillStyle = bodyCol;
  ctx.beginPath(); ctx.ellipse(0, -2, 22, 20, 0, 0, Math.PI*2); ctx.fill();

  // Front arm nubs
  ctx.fillStyle = legCol;
  ctx.beginPath(); ctx.ellipse(-17,  9, 9, 7, -0.30, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 17,  9, 9, 7,  0.30, 0, Math.PI*2); ctx.fill();

  // Belly patch
  ctx.fillStyle = belCol;
  ctx.beginPath(); ctx.ellipse(0, 4, 15, 13, 0, 0, Math.PI*2); ctx.fill();

  // Eyes on top of head
  const useSmallEyes = equippedAccessory === 'smalleyes' || equippedAccessory2 === 'smalleyes';
  const blinkProg = f.blinking ? Math.sin(f.blinkFrame / 9 * Math.PI) : 0;
  const _isRightRobotic = equippedAccessory === 'roboticeye' || _cyborg;
  [[-10, -22, false], [10, -22, _isRightRobotic]].forEach(([ex, ey, skipOrg]) => {
    const eyeR = useSmallEyes ? 6 : 9;
    const pupR = useSmallEyes ? 4 : 6;
    const ey2  = useSmallEyes ? ey + 4 : ey;
    // Outline ring in main body color (organic eyes only)
    if (!skipOrg) {
      ctx.strokeStyle = bodyCol; ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.arc(ex, ey2, eyeR + 1.5, 0, Math.PI*2); ctx.stroke();
    }
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(ex, ey2, eyeR, 0, Math.PI*2); ctx.fill();
    if (!skipOrg) {
      if (blinkProg < 0.92) {
        ctx.fillStyle = eyeCol;
        ctx.beginPath(); ctx.arc(ex + 1, ey2 + 1, pupR, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#ffffff';
        ctx.beginPath(); ctx.arc(ex - 2, ey2 - 2, useSmallEyes ? 1.2 : 2, 0, Math.PI*2); ctx.fill();
      }
      if (blinkProg > 0.05) {
        ctx.save();
        ctx.beginPath(); ctx.arc(ex, ey2, eyeR + 0.5, 0, Math.PI*2); ctx.clip();
        ctx.fillStyle = legCol; // darker eyelid
        ctx.fillRect(ex - eyeR - 1, ey2 - eyeR - 1, (eyeR + 1) * 2, (eyeR + 1) * 2 * blinkProg);
        ctx.restore();
      }
    }
  });

  // Mouth
  if (f.tonguePhase !== 'idle') {
    ctx.fillStyle = '#e04080';
    ctx.beginPath(); ctx.ellipse(0, -9, 6, 4, 0, 0, Math.PI*2); ctx.fill();
  } else {
    ctx.strokeStyle = olCol; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
    ctx.beginPath();
    if (f.frownTimer > 0) {
      ctx.moveTo(-7, -8); ctx.quadraticCurveTo(0, -13, 7, -8);
    } else if (f.charging) {
      ctx.moveTo(-6, -10); ctx.lineTo(6, -10);
    } else {
      ctx.moveTo(-7, -10); ctx.quadraticCurveTo(0, -6, 7, -10);
    }
    ctx.stroke();
    if (equippedAccessory === 'tongueout') {
      ctx.fillStyle = '#d040a0';
      ctx.beginPath(); ctx.ellipse(0, -5, 3, 5, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#b02878';
      ctx.beginPath(); ctx.arc(0, -1, 2.5, 0, Math.PI*2); ctx.fill();
    }
  }

  drawAccessory(equippedAccessory);
  if (equippedAccessory2) drawAccessory(equippedAccessory2);

  // Cyborg bundle: overdraw right half with mechanical look
  if (_cyborg) {
    const _cbAcc  = getSkinProp('body');   // accent / circuit colour
    const _cbGlow = getSkinProp('belly');  // inner glow colour
    const _cbEye  = getSkinProp('eye');    // dark eye bg

    // Right back legs — pose-aware, drawn BEFORE body overlay
    ctx.fillStyle = '#0c0c18';
    if (!f.grounded) {
      ctx.beginPath(); ctx.ellipse(30,1,14,8,0.15,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(33,11,12,7,-0.05,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = _cbAcc;
      ctx.beginPath(); ctx.arc(31,2,2.5,0,Math.PI*2); ctx.fill();
    } else if (f.charging) {
      ctx.beginPath(); ctx.ellipse(21,8,12,9,-0.45,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(18,20,10,7,-0.10,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = _cbAcc;
      ctx.beginPath(); ctx.arc(22,8,2.5,0,Math.PI*2); ctx.fill();
    } else {
      ctx.beginPath(); ctx.ellipse(24,6,13,10,-0.30,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(21,18,11,8,-0.08,0,Math.PI*2); ctx.fill();
      ctx.fillStyle = _cbAcc;
      ctx.beginPath(); ctx.arc(25,6,2.5,0,Math.PI*2); ctx.fill();
    }
    // Right arm
    ctx.fillStyle = '#1e1e2e';
    ctx.beginPath(); ctx.ellipse(17,9,9,7,0.30,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = _cbAcc;
    ctx.beginPath(); ctx.arc(20,10,2.5,0,Math.PI*2); ctx.fill();

    // Right body half — clip to body ellipse
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(0,-2,22,20,0,-Math.PI/2,Math.PI/2);
    ctx.lineTo(0,-2); ctx.closePath();
    ctx.clip();
    ctx.fillStyle = '#2a2a3a';
    ctx.fillRect(-1,-30,30,55);
    ctx.strokeStyle = _cbAcc; ctx.lineWidth = 1.2; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(4,-14); ctx.quadraticCurveTo(18,-8,20,2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(8,4); ctx.quadraticCurveTo(22,8,18,18); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(14,-10); ctx.lineTo(28,-4); ctx.stroke();
    ctx.strokeStyle = _cbAcc; ctx.lineWidth = 2.5; ctx.lineCap = 'square';
    ctx.beginPath(); ctx.moveTo(0,-22); ctx.lineTo(0,18); ctx.stroke();
    ctx.restore();

    // Right eye overlay
    const cbEyeR = useSmallEyes ? 6 : 9;
    const cbEyeY = useSmallEyes ? -18 : -22;
    ctx.fillStyle = _cbEye;
    ctx.beginPath(); ctx.arc(10,cbEyeY,cbEyeR,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = _cbAcc; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(10,cbEyeY,cbEyeR,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle = _cbGlow;
    ctx.beginPath(); ctx.arc(10,cbEyeY,cbEyeR*0.39,0,Math.PI*2); ctx.fill();
    // Redraw bowtie on top of cyborg metal so it isn't covered
    if (equippedAccessory === 'bowtie' || equippedAccessory2 === 'bowtie') {
      drawAccessory('bowtie');
    }
  }

  ctx.restore();

  // Tongue (world space)
  if (f.tonguePhase !== 'idle') {
    const cos = Math.cos(f.rot), sin = Math.sin(f.rot);
    const mouthX = sx + 0 * cos - (-9) * sin;
    const mouthY = sy + 0 * sin + (-9) * cos;
    const reach  = f.tongueProg * (f.tongueLen || TONGUE_MAX);
    const tipX   = mouthX + Math.cos(f.tongueAngle) * reach;
    const tipY   = mouthY + Math.sin(f.tongueAngle) * reach;
    const cpx    = (mouthX + tipX) / 2 - Math.sin(f.tongueAngle) * 12;
    const cpy    = (mouthY + tipY) / 2 + Math.cos(f.tongueAngle) * 12;
    ctx.save();
    if (equippedBundle === 'cyborg') {
      ctx.strokeStyle = getSkinProp('body'); ctx.lineWidth = 7; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(mouthX, mouthY);
      ctx.quadraticCurveTo(cpx, cpy, tipX, tipY); ctx.stroke();
      ctx.strokeStyle = getSkinProp('eye'); ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(mouthX, mouthY);
      ctx.quadraticCurveTo(cpx, cpy, tipX, tipY); ctx.stroke();
    } else {
      ctx.strokeStyle = '#d040a0'; ctx.lineWidth = 7; ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(mouthX, mouthY);
      ctx.quadraticCurveTo(cpx, cpy, tipX, tipY); ctx.stroke();
    }
    ctx.fillStyle = equippedBundle === 'cyborg' ? getSkinProp('body') : '#b02878';
    ctx.beginPath(); ctx.arc(tipX, tipY, 7, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Power arc
  if (f.charging && !f.dead) {
    const power = POW_MIN + f.charge * POW_RNG;
    const tvx = power * VX_RATIO;
    let tvy = -power;
    let tx = f.x, ty = f.y;
    // Simulate trajectory to find actual landing point first
    let landX = null, landY = null, landsOnPad = false;
    let simTx = f.x, simTy = f.y, simVy = -power;
    for (let step = 0; step < 80; step++) {
      simTx += tvx; simTy += simVy; simVy += GRAVITY;
      if (simTy >= WATER_Y) { landX = simTx; landY = WATER_Y; break; }
      for (let pi = curPad + 1; pi < Math.min(curPad + 5, pads.length); pi++) {
        const pp = pads[pi];
        if (pp.st === 3) continue;
        const pw = pp.w * (currentEvent === 'spring' ? 1.4 : currentEvent === 'winter' ? 0.70 : 1);
        if (Math.abs(simTx - pp.x) <= pw/2 + 4 && simTy >= pp.y - 24 && simTy <= pp.y + 10) {
          landX = simTx; landY = pp.y - 23; landsOnPad = true; break;
        }
      }
      if (landX !== null) break;
    }
    // Arc color: green only when we confirmed a pad landing, orange otherwise
    const arcCol = landsOnPad ? [80, 220, 80] : [220, 140, 40];
    ctx.save(); ctx.globalAlpha = 0.55;
    for (let step = 0; step < 60; step++) {
      tx += tvx; ty += tvy; tvy += GRAVITY;
      if (ty > WATER_Y) break;
      const prog = step / 60;
      ctx.fillStyle = `rgba(${arcCol[0]},${arcCol[1]},${arcCol[2]},${0.7-prog*0.7})`;
      ctx.beginPath(); ctx.arc(tx - camX, ty, 2.5, 0, Math.PI*2); ctx.fill();
    }
    if (landX !== null) {
      ctx.fillStyle = landsOnPad ? '#40ff40' : '#ff4040';
      ctx.beginPath(); ctx.arc(landX - camX, landY, 7, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
    const bw = 54, bh = 9;
    const bx = sx - bw/2, by = sy - 20 * f.sqY - 30;
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.beginPath(); ctx.roundRect(bx-2, by-2, bw+4, bh+4, 4); ctx.fill();
    [[0, 0.35, '#c83030'], [0.35, 0.70, '#30b830'], [0.70, 1, '#c83030']].forEach(([s, e, col]) => {
      ctx.fillStyle = col; ctx.fillRect(bx + s*bw, by, (e-s)*bw, bh);
    });
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(bx + f.charge*bw, by, bw*(1-f.charge), bh);
    ctx.strokeStyle = 'rgba(255,255,255,0.85)'; ctx.lineWidth = 1.5;
    ctx.strokeRect(bx + 0.35*bw, by-1, 0.35*bw, bh+2);
    ctx.fillStyle = '#bbb'; ctx.font = '9px Arial';
    ctx.textAlign = 'center'; ctx.fillText('POWER', sx, by-5); ctx.textAlign = 'left';
  }
}

// ── Accessories ───────────────────────────────
function drawAccessory(accId) {
  if (!accId || accId === 'tongueout' || accId === 'smalleyes') return;
  ctx.save();
  if (accId === 'glasses') {
    ctx.strokeStyle = '#555'; ctx.lineWidth = 1.8;
    ctx.beginPath(); ctx.arc(-10,-22,7.5,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc( 10,-22,7.5,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-2.5,-22); ctx.lineTo(2.5,-22); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-17.5,-22); ctx.lineTo(-21,-18); ctx.stroke();
    ctx.beginPath(); ctx.moveTo( 17.5,-22); ctx.lineTo( 21,-18); ctx.stroke();
  } else if (accId === 'tophat') {
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.ellipse(0,-31,13,3.5,0,0,Math.PI*2); ctx.fill();
    ctx.fillRect(-9,-50,18,20);
    ctx.fillStyle = '#4a3000'; ctx.fillRect(-9,-33,18,3);
  } else if (accId === 'monocle') {
    ctx.strokeStyle = '#a09050'; ctx.lineWidth = 1.8;
    ctx.beginPath(); ctx.arc(10,-22,10,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle = '#887744'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(20,-14); ctx.lineTo(22,-8); ctx.stroke();
  } else if (accId === 'crown') {
    ctx.fillStyle = '#ffd700';
    ctx.fillRect(-12,-34,24,4);
    ctx.beginPath();
    ctx.moveTo(-12,-34); ctx.lineTo(-8,-45); ctx.lineTo(-4,-35);
    ctx.lineTo(0,-47); ctx.lineTo(4,-35); ctx.lineTo(8,-45); ctx.lineTo(12,-34);
    ctx.fill();
    ctx.fillStyle = '#ff3030'; ctx.beginPath(); ctx.arc(-8,-43,2.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#4488ff'; ctx.beginPath(); ctx.arc(0,-44.5,2.5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ff3030'; ctx.beginPath(); ctx.arc(8,-43,2.5,0,Math.PI*2); ctx.fill();
  } else if (accId === 'bowtie') {
    const by = 0;
    // Left wing
    ctx.fillStyle = '#c42020';
    ctx.beginPath(); ctx.moveTo(-1.5,by-1); ctx.lineTo(-13,by-7); ctx.lineTo(-13,by+3); ctx.lineTo(-1.5,by+1); ctx.closePath(); ctx.fill();
    // Right wing
    ctx.beginPath(); ctx.moveTo(1.5,by-1); ctx.lineTo(13,by-7); ctx.lineTo(13,by+3); ctx.lineTo(1.5,by+1); ctx.closePath(); ctx.fill();
    // Top highlight fold (lighter)
    ctx.fillStyle = '#e83838';
    ctx.beginPath(); ctx.moveTo(-1.5,by-0.5); ctx.lineTo(-11,by-6); ctx.lineTo(-9,by-2); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(1.5,by-0.5); ctx.lineTo(11,by-6); ctx.lineTo(9,by-2); ctx.closePath(); ctx.fill();
    // Bottom shadow fold
    ctx.fillStyle = '#981010';
    ctx.beginPath(); ctx.moveTo(-1.5,by+0.5); ctx.lineTo(-12,by+2.5); ctx.lineTo(-10,by+0.5); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(1.5,by+0.5); ctx.lineTo(12,by+2.5); ctx.lineTo(10,by+0.5); ctx.closePath(); ctx.fill();
    // Center knot
    ctx.fillStyle = '#b01818';

function frogTick() {

function startEvent(type) {
  currentEvent = type;
  const dur = 75 * 1000; // 75 seconds
  eventEndTime = Date.now() + dur;
  // Schedule next event 1-2 minutes after this one ends
  const cooldown = 60 * 1000;
  nextEventTime = eventEndTime + cooldown;
  if (type === 'volcanic') {
    volcanoX = frog.x + W * 0.8 + Math.random() * W;
    lavaBombs = []; lavaSpawnTimer = 0;
    startVolcanicAmbience();
  } else if (type === 'winter') {
    startWinterAmbience();
  } else if (type === 'spring') {
    startSpringAmbience();
  }
}

function endEvent() {
  stopEventAmbience();
  currentEvent = null;
  lavaBombs = [];
  emberParts = []; steamParts = [];
}

function tickEvent() {
  if (!frog || frog.dead) return;
  const now = Date.now();
  // Start event if time reached
  if (!currentEvent && now >= nextEventTime) {
    startEvent('spring');
  }
  // End event when time up
  if (currentEvent && now >= eventEndTime) { endEvent(); return; }

  if (currentEvent === 'volcanic') {
    lavaSpawnTimer++;
    if (lavaSpawnTimer >= 180) { // spawn every 3 seconds
      lavaSpawnTimer = 0;
      const vsx = camX + W - 110; // matches the always-visible volcano position
      const angle = -Math.PI * 0.5 + (Math.random() - 0.5) * 0.9;
      const spd = 6 + Math.random() * 4;
      lavaBombs.push({ x: vsx, y: PAD_BASE_Y - 150, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd, alive: true, r: 8 });
    }
    // Tick lava bombs
    lavaBombs.forEach(lb => {
      if (!lb.alive) return;
      lb.vy += GRAVITY * 0.6;
      lb.x += lb.vx; lb.y += lb.vy;
      if (lb.y >= WATER_Y) { lb.alive = false; spark(lb.x, WATER_Y, 'splash'); return; }
      // Hit frog
      if (frame >= invincibleUntil && Math.hypot(lb.x - frog.x, lb.y - frog.y) < 24) {
        lb.alive = false;
        spark(lb.x, lb.y, 'land');
        takeDamage('lava');
      }
    });
    lavaBombs = lavaBombs.filter(lb => lb.alive || lb.y < WATER_Y + 10);
  }
}

function drawLavaBombs() {
  lavaBombs.forEach(lb => {
    if (!lb.alive) return;
    const sx = lb.x - camX;
    if (sx < -40 || sx > W + 40) return;
    // Glow
    const g = ctx.createRadialGradient(sx, lb.y, 0, sx, lb.y, lb.r * 2.5);
    g.addColorStop(0, 'rgba(255,200,60,0.9)');
    g.addColorStop(0.5, 'rgba(255,80,10,0.7)');
    g.addColorStop(1, 'rgba(255,40,0,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(sx, lb.y, lb.r * 2.5, 0, Math.PI*2); ctx.fill();
    // Core
    ctx.fillStyle = '#ffcc40';
    ctx.beginPath(); ctx.arc(sx, lb.y, lb.r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ff6010';
    ctx.beginPath(); ctx.arc(sx+1, lb.y+1, lb.r * 0.6, 0, Math.PI*2); ctx.fill();
  });
}

// ── Alligators ─────────────────────────────────
function trySpawnGator() {
  // Find a visible pad pair with a gap of 220–480px and nothing else (e.g. a
  // branch pad) sitting in that gap, so the gator only ever appears in open
  // water strictly between two pads — never under or overlapping a pad.
  for (let i = curPad + 2; i < Math.min(curPad + 14, pads.length - 1); i++) {
    const pA = pads[i], pB = pads[i + 1];
    if (pA.st >= 2 || pB.st >= 2) continue;
    const left = pA.x <= pB.x ? pA : pB;
    const right = pA.x <= pB.x ? pB : pA;
    const gap = right.x - left.x;
    if (gap < 220 || gap > 480) continue;
    const zoneL = left.x + left.w * 0.3;
    const zoneR = right.x - right.w * 0.3;
    // Make sure no other pad (e.g. a cluster's branch pad) falls inside the gap
    const blocked = pads.some(p => p !== left && p !== right && p.x > zoneL && p.x < zoneR);
    if (blocked) continue;
    const midX = (left.x + right.x) / 2;
    const sxL = left.x - camX, sxR = right.x - camX;
    if (sxL < 40 || sxR > W - 40) continue; // both pads must be visible
    if (gators.some(g => Math.abs(g.x - midX) < 250)) continue; // no crowding
    gators.push({
      x: midX,
      zoneL, zoneR, // inner edge zone where detection triggers
      phase: 'rising', timer: 0, lungeT: 0
    });
    return;
  }
}

function tickGators() {
  if (!frog || frog.dead) return;
  // No gators in winter
  if (currentEvent === 'winter') { gators = []; return; }
  // Spawn cooldown
  gatorSpawnCooldown--;
  if (gatorSpawnCooldown <= 0 && gators.length < 2 && score >= 4) {
    if (Math.random() < 0.004) { trySpawnGator(); gatorSpawnCooldown = 480; }
  }
  gators.forEach(g => {
    g.timer++;
    if (g.phase === 'rising') {
      if (g.timer >= 30) { g.phase = 'lurking'; g.timer = 0; }
    } else if (g.phase === 'lurking') {
      if (g.timer >= 480) { g.phase = 'submerging'; g.timer = 0; return; }
      // Detect frog crossing the danger zone while airborne
      if (!frog.grounded && !frog.dead && frame >= invincibleUntil) {
        if (frog.x >= g.zoneL && frog.x <= g.zoneR && frog.y <= WATER_Y - 2) {
          g.phase = 'lunging'; g.lungeT = 0;
          waterHitWX = frog.x;
          takeDamage('eaten');
        }
      }
    } else if (g.phase === 'submerging') {
      if (g.timer >= 30) { g.phase = 'done'; }
    } else if (g.phase === 'lunging') {
      g.lungeT++;
      if (g.lungeT >= 55) { g.phase = 'submerging'; g.timer = 0; }
    }
  });
  gators = gators.filter(g => g.phase !== 'done');
}

function drawGators() {
  gators.forEach(g => {
    const sx = g.x - camX;
    if (sx < -120 || sx > W + 120) return;
    let emerge = 0;
    if      (g.phase === 'rising')     emerge = Math.min(1, g.timer / 28);
    else if (g.phase === 'lurking')    emerge = 1;
    else if (g.phase === 'submerging') emerge = Math.max(0, 1 - g.timer / 28);
    else if (g.phase === 'lunging')    emerge = Math.min(2.8, 1 + g.lungeT * 0.11);
    if (emerge <= 0) return;

    ctx.save();
    ctx.globalAlpha = Math.min(1, emerge * 3);
    const riseH = emerge * 42;
    const mouthOpen = g.phase === 'lunging'
      ? Math.min(1, g.lungeT / 8)
      : (0.25 + Math.sin(g.timer * 0.055) * 0.12);
    const jawSep = mouthOpen * 30;
    const headTop     = WATER_Y - riseH;
    const upperJawBot = WATER_Y - jawSep * 0.52;
    const lowerJawTop = WATER_Y + jawSep * 0.48;
    const HW = 42;

    // ── Upper jaw — gradient ────────────────────
    const gTop = ctx.createLinearGradient(sx - HW, headTop, sx - HW, WATER_Y);
    gTop.addColorStop(0,   '#3a8c22');
    gTop.addColorStop(0.5, '#2e7818');
    gTop.addColorStop(1,   '#1a5010');
    ctx.fillStyle = gTop;
    ctx.beginPath();
    ctx.moveTo(sx + HW, WATER_Y + 5);
    ctx.lineTo(sx + HW, headTop + 12);
    ctx.quadraticCurveTo(sx + HW * 0.15, headTop, sx - HW * 0.3, headTop + 6);
    ctx.bezierCurveTo(sx - HW * 0.75, headTop + 10, sx - HW - 10, upperJawBot - 3, sx - HW - 10, upperJawBot);
    ctx.lineTo(sx - HW - 10, WATER_Y - 2);
    ctx.quadraticCurveTo(sx, WATER_Y + 4, sx + HW, WATER_Y + 5);
    ctx.closePath(); ctx.fill();

    // Dorsal ridge bumps
    ctx.fillStyle = '#1e5a10';
    for (let k = 0; k < 5; k++) {
      const bx = sx + HW * 0.65 - k * 13;
      const by = headTop + 7 + k * 2;
      ctx.beginPath(); ctx.arc(bx, by, 3.5 - k * 0.3, Math.PI, 0); ctx.fill();
    }
    // Scale texture (arc rows)
    ctx.strokeStyle = 'rgba(0,0,0,0.20)'; ctx.lineWidth = 1;
    for (let k = 0; k < 5; k++) {
      const bx = sx - HW + 6 + k * 13;
      const by = headTop + 14 + k * 2;
      ctx.beginPath(); ctx.arc(bx, by, 4, Math.PI, 0); ctx.stroke();
    }
    for (let k = 0; k < 4; k++) {
      const bx = sx - HW + 13 + k * 13;
      const by = headTop + 23 + k * 1.5;
      ctx.beginPath(); ctx.arc(bx, by, 3, Math.PI, 0); ctx.stroke();
    }

    // ── Lower jaw ──────────────────────────────
    const gBot = ctx.createLinearGradient(sx - HW, lowerJawTop, sx - HW, WATER_Y + 10);
    gBot.addColorStop(0, '#246014');
    gBot.addColorStop(1, '#163808');
    ctx.fillStyle = gBot;
    ctx.beginPath();
    ctx.moveTo(sx + HW - 4, WATER_Y + 8);
    ctx.lineTo(sx - HW - 4, lowerJawTop + 2);
    ctx.lineTo(sx - HW - 4, WATER_Y + 5);
    ctx.quadraticCurveTo(sx, WATER_Y + 11, sx + HW - 4, WATER_Y + 8);
    ctx.closePath(); ctx.fill();

    // Inner mouth glow when opening
    if (mouthOpen > 0.25) {
      const ma = Math.min(1, (mouthOpen - 0.25) / 0.55);
      ctx.fillStyle = `rgba(190,75,75,${ma * 0.75})`;
      ctx.beginPath();
      ctx.moveTo(sx - HW, upperJawBot);
      ctx.lineTo(sx - HW, lowerJawTop);
      ctx.quadraticCurveTo(sx - HW * 0.4, lowerJawTop + jawSep * 0.15, sx + HW - 12, WATER_Y);
      ctx.closePath(); ctx.fill();
    }

    // ── Teeth ──────────────────────────────────
    ctx.fillStyle = '#efe8c8';
    for (let k = 0; k < 7; k++) {
      const tx = sx - HW + 2 + k * 11;
      ctx.beginPath(); ctx.moveTo(tx - 3, upperJawBot); ctx.lineTo(tx, upperJawBot + jawSep * 0.46); ctx.lineTo(tx + 3, upperJawBot); ctx.closePath(); ctx.fill();
    }
    ctx.fillStyle = '#e8e0b8';
    for (let k = 0; k < 6; k++) {
      const tx = sx - HW + 7 + k * 11;
      ctx.beginPath(); ctx.moveTo(tx - 2.5, lowerJawTop); ctx.lineTo(tx, lowerJawTop - jawSep * 0.4); ctx.lineTo(tx + 2.5, lowerJawTop); ctx.closePath(); ctx.fill();
    }

    // ── Eye — golden with vertical slit pupil ──
    const eyeX = sx + HW * 0.44;
    const eyeY = headTop + 13;
    ctx.fillStyle = '#285e14';
    ctx.beginPath(); ctx.ellipse(eyeX, eyeY, 12, 9, -0.12, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#c8b858';
    ctx.beginPath(); ctx.ellipse(eyeX, eyeY, 9, 6.5, -0.1, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#080808';
    ctx.beginPath(); ctx.ellipse(eyeX, eyeY, 2.2, 5.5, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.beginPath(); ctx.ellipse(eyeX - 2.5, eyeY - 2, 2.2, 1.3, -0.5, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#163808'; ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.ellipse(eyeX, eyeY, 9, 6.5, -0.1, 0, Math.PI*2); ctx.stroke();

    // ── Nostrils ───────────────────────────────
    ctx.fillStyle = '#122808';
    ctx.beginPath(); ctx.ellipse(sx - HW - 4, headTop + 9, 2.8, 2, -0.35, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(sx - HW - 2, headTop + 14, 2.8, 2, -0.2, 0, Math.PI*2); ctx.fill();

    // ── Water ripple ───────────────────────────
    if (emerge < 1.2) {
      ctx.strokeStyle = `rgba(80,180,200,${0.35 * (1 - Math.min(1, emerge))})`;
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.ellipse(sx, WATER_Y, 62, 8, 0, 0, Math.PI*2); ctx.stroke();
    }
    // Lunge warning glow
    if (g.phase === 'lunging' && g.lungeT < 30) {
      const gw = ctx.createRadialGradient(sx, WATER_Y, 0, sx, WATER_Y, 76);
      gw.addColorStop(0, `rgba(255,50,50,${0.3 * (1 - g.lungeT / 30)})`);
      gw.addColorStop(1, 'rgba(255,0,0,0)');
      ctx.save(); ctx.globalAlpha = 1; ctx.fillStyle = gw;
      ctx.beginPath(); ctx.arc(sx, WATER_Y, 76, 0, Math.PI*2); ctx.fill(); ctx.restore();
    }
    ctx.restore();
  });
}

// ── Particles ──────────────────────────────────
function spark(x, y, type) {
  const n = type === 'splash' ? 28 : 12;
  for (let i = 0; i < n; i++) {
    const a = type === 'splash' ? -Math.PI + Math.random() * Math.PI : Math.random() * Math.PI * 2;
    const sp = type === 'splash' ? 2 + Math.random()*7 : 1 + Math.random()*3;
    parts.push({ x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - (type==='splash' ? 2.5 : 0),
      r: type === 'splash' ? 3 + Math.random()*5 : 2 + Math.random()*3,
      c: type === 'splash' ? '#48b0e0' : '#50b050', l: 1, d: 0.024 + Math.random()*0.04 });
  }
}
function tickParts() {
  parts = parts.filter(p => p.l > 0);
  parts.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.22;
    p.l -= p.d;
    const sx = p.x - camX;
    ctx.save(); ctx.globalAlpha = Math.max(0, p.l);
    ctx.fillStyle = p.c;
    ctx.beginPath(); ctx.arc(sx, p.y, Math.max(0, p.r * p.l), 0, Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

// ── Water ripples ──────────────────────────────
function drawWaterRipples(sx, sy) {
  const elapsed = (frame - deathFrame) / 60;
  for (let i = 0; i < 4; i++) {
    const t = elapsed - i * 0.28;
    if (t <= 0) continue;
    const prog = Math.min(1, t * 0.72);
    const a = (1 - prog) * 0.48;
    if (a <= 0.01) continue;
    ctx.save(); ctx.globalAlpha = a;
    ctx.strokeStyle = '#80c8e8'; ctx.lineWidth = 2.5 - prog * 1.2;
    ctx.beginPath(); ctx.ellipse(sx, sy, prog * 72, prog * 20, 0, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
  }
}

// ── Bugs ──────────────────────────────────────
function genBugs() {
  bugs = [];
  const last = pads[pads.length - 1];
  const span = last.x + 400;
  const flyCount = 10;
  for (let i = 0; i < flyCount; i++) {
    const ox = 300 + Math.random() * (span - 300);
    bugs.push({ type:'fly', alive:true, ox, oy: PAD_BASE_Y - 80 - Math.random()*100,
      x:0, y:0, phase: Math.random()*Math.PI*2, wingPhase: Math.random()*Math.PI*2 });
  }
  for (let i = 0; i < 6; i++) {
    const ox = 300 + Math.random() * (span - 300);
    bugs.push({ type:'firefly', alive:true, ox, oy: PAD_BASE_Y - 60 - Math.random()*80,
      x:0, y:0, phase: Math.random()*Math.PI*2, glowPhase: Math.random()*Math.PI*2, wingPhase:0 });
  }
  bugs.forEach(b => { b.x = b.ox + Math.cos(b.phase)*20; b.y = b.oy + Math.sin(b.phase*0.7)*10; });
}
function tickBugs() {
  bugs.forEach(b => {
    if (!b.alive) return;
    const spd = b.type === 'fly' ? 0.035 : 0.012;
    b.phase += spd; b.x = b.ox + Math.cos(b.phase) * 22; b.y = b.oy + Math.sin(b.phase * 0.75) * 11;
    b.wingPhase += 0.4;
    if (b.glowPhase !== undefined) b.glowPhase += 0.05;
  });
}
function drawBugs() {
  bugs.forEach(b => {
    if (!b.alive) return;
    const sx = b.x - camX;
    if (sx < -40 || sx > W + 40) return;
    // During spring, don't draw regular flies
    if (currentEvent === 'spring' && b.type === 'fly') return;
    if (b.type === 'fly') {
      const wa = Math.abs(Math.sin(b.wingPhase)) * 0.4;
      ctx.save(); ctx.globalAlpha = 0.55; ctx.fillStyle = '#c8dcff';
      ctx.beginPath(); ctx.ellipse(sx - 4, b.y - 2, 6, 2.5, -wa, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(sx + 4, b.y - 2, 6, 2.5,  wa, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      ctx.fillStyle = '#2a1e10';
      ctx.beginPath(); ctx.ellipse(sx, b.y, 3, 2, 0, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#2a1e10'; ctx.lineWidth = 0.9;
      ctx.beginPath(); ctx.moveTo(sx-1, b.y+1); ctx.lineTo(sx-4, b.y+5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx+1, b.y+1); ctx.lineTo(sx+4, b.y+5); ctx.stroke();
    } else {
      const glow = Math.max(0, Math.sin(b.glowPhase * 2.8) * 0.5 + 0.5);
      ctx.save(); ctx.globalAlpha = 0.28 + glow * 0.55;
      const fg = ctx.createRadialGradient(sx, b.y, 0, sx, b.y, 10);
      fg.addColorStop(0, 'rgba(220,255,80,1)'); fg.addColorStop(1, 'rgba(80,180,20,0)');
      ctx.fillStyle = fg;
      ctx.beginPath(); ctx.arc(sx, b.y, 10, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      ctx.fillStyle = '#1a2a08';

}

let bgPads = [];
function genBgPads() {
  bgPads = [];
  for (let i = 0; i < 18; i++) {

      w: 22 + Math.random() * 30, rot: Math.random() * 0.5 - 0.25, alpha: 0.28 + Math.random() * 0.22 });
  }
}
function drawBgPads() {
  bgPads.forEach(p => {
    const sx = p.x - camX;
    if (sx < -100 || sx > W + 100) return;
    ctx.save(); ctx.globalAlpha = p.alpha; ctx.translate(sx, p.y); ctx.rotate(p.rot);
    ctx.fillStyle = '#285828';
    ctx.beginPath(); ctx.ellipse(0, 0, p.w/2, p.w * 0.22, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#1c3c1c'; ctx.lineWidth = 0.7;
    ctx.beginPath(); ctx.moveTo(0, -p.w * 0.20); ctx.lineTo(0, p.w * 0.20); ctx.stroke();
    ctx.restore();
  });
}

// ── Level generation ──────────────────────────
function addPadCluster(x, y, spacing) {
  pads.push(makePad(x, y, 52 + Math.random() * 24));
  if (Math.random() < 0.35) {
    const ox = x + spacing * (Math.random() < 0.5 ? -1 : 1) * (0.6 + Math.random() * 0.4);
    const oy = y + (Math.random() - 0.5) * 48;
    if (Math.abs(oy - PAD_BASE_Y) < 100) pads.push(makePad(ox, oy, 36 + Math.random() * 18));
  }
}
function genLevel() {
  pads = [makePad(100, PAD_BASE_Y, 70)];
  let x = 100, y = PAD_BASE_Y;
  for (let i = 0; i < 28; i++) {
    x += 150 + Math.random() * 175;
    y = PAD_BASE_Y + (Math.random() - 0.5) * 90;
    addPadCluster(x, y, 35 + Math.random() * 50);
    x = pads[pads.length - 1].x;
  }
}
function extendLevel() {
  let x = pads[pads.length - 1].x;
  let y = pads[pads.length - 1].y;
  for (let i = 0; i < 14; i++) {
    x += 150 + Math.random() * 175;
    y = PAD_BASE_Y + (Math.random() - 0.5) * 90;
    addPadCluster(x, y, 35 + Math.random() * 50);
    x = pads[pads.length - 1].x;
  }
}

function drawHUD() {
  // Score box
  ctx.fillStyle = 'rgba(0,0,0,0.52)';
  ctx.beginPath(); ctx.roundRect(12, 12, 126, 48, 8); ctx.fill();
  ctx.fillStyle = '#999'; ctx.font = '11px Arial'; ctx.fillText('LILY PADS', 22, 29);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 22px Arial'; ctx.fillText(score, 22, 52);

  // Lives (hearts)
  const heartY = 72;
  for (let i = 0; i < 3; i++) {
    const hx = 22 + i * 22;
    if (i < lives) {
      ctx.font = '16px serif'; ctx.fillText('❤️', hx - 8, heartY);
    } else {
      ctx.globalAlpha = 0.25; ctx.font = '16px serif'; ctx.fillText('🖤', hx - 8, heartY); ctx.globalAlpha = 1;
    }
  }

  // Lily pad balance (top right)
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath(); ctx.roundRect(W-122, 12, 110, 34, 8); ctx.fill();
  ctx.fillStyle = '#80ff80'; ctx.font = 'bold 13px Arial';
  ctx.textAlign = 'right'; ctx.fillText('🍃 ' + lilyPadsBalance + ' lily pads', W-12, 34); ctx.textAlign = 'left';

  // Time icon
  const icon = tod > 0.29 && tod < 0.72 ? (tod < 0.50 ? '🌅' : '☀️') : (tod > 0.72 ? '🌆' : '🌙');
  ctx.font = '14px serif';
  ctx.textAlign = 'right'; ctx.fillText(icon, W - 12, 55); ctx.textAlign = 'left';

  // Event indicator
  if (currentEvent) {
    const evNames = { volcanic:'🌋 VOLCANIC', winter:'❄️ WINTER', spring:'🌸 SPRING' };
    const evCols  = { volcanic:'#ff6030', winter:'#80c8ff', spring:'#80ff80' };
    const evText  = evNames[currentEvent] || '';
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.beginPath(); ctx.roundRect(W/2 - 70, 12, 140, 28, 8); ctx.fill();
    ctx.fillStyle = evCols[currentEvent] || '#fff'; ctx.font = 'bold 13px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(evText, W/2, 31);
    ctx.textAlign = 'left';
  }

  // Pad boost indicator
  const now = Date.now();
  let boostY = 108;
  if (now < padBoostEnd) {
    const secs = ((padBoostEnd - now) / 1000).toFixed(1);
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.beginPath(); ctx.roundRect(12, boostY, 152, 26, 6); ctx.fill();
    ctx.fillStyle = '#ffe060'; ctx.font = 'bold 11px Arial';
    ctx.fillText('🍃 2x BOOST  ' + secs + 's', 20, boostY + 17);
    boostY += 30;
  }
  if (now < jumpBoostEnd) {
    const secs = ((jumpBoostEnd - now) / 1000).toFixed(1);
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.beginPath(); ctx.roundRect(12, boostY, 152, 26, 6); ctx.fill();
    ctx.fillStyle = '#60aaff'; ctx.font = 'bold 11px Arial';
    ctx.fillText('⬆ JUMP BOOST  ' + secs + 's', 20, boostY + 17);
    boostY += 30;
  }
  if (now < speedBoostEnd) {
    const secs = ((speedBoostEnd - now) / 1000).toFixed(1);
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.beginPath(); ctx.roundRect(12, boostY, 152, 26, 6); ctx.fill();
    ctx.fillStyle = '#ff9030'; ctx.font = 'bold 11px Arial';
    ctx.fillText('⚡ SPEED BOOST  ' + secs + 's', 20, boostY + 17);
    boostY += 30;
  }

  // Balance bar
  if (frog.balancing && currentEvent !== 'spring') {
    const frac = frog.balanceT / BALANCE_MAX_T;
    const col = frac > 0.7 ? '#ff8040' : '#40d0ff';
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.beginPath(); ctx.roundRect(W/2 - 55, H - 36, 110, 22, 6); ctx.fill();
    ctx.fillStyle = col; ctx.font = 'bold 11px Arial'; ctx.textAlign = 'center';
    ctx.fillText('BALANCING  ' + (BALANCE_MAX_T - frog.balanceT).toFixed(0) + 's', W/2, H - 20);
    ctx.textAlign = 'left';
  }

  // Frozen timer on ice
  if (frog.onIce && currentEvent === 'winter') {
    const sToNext = ((180 - frozenDamageTimer) / 60).toFixed(1);
    ctx.fillStyle = 'rgba(0,30,60,0.65)';
    ctx.beginPath(); ctx.roundRect(W/2 - 70, H - 64, 140, 26, 6); ctx.fill();
    ctx.fillStyle = '#a0e0ff'; ctx.font = 'bold 11px Arial'; ctx.textAlign = 'center';
    ctx.fillText('❄️ FREEZING  ' + sToNext + 's', W/2, H - 44); ctx.textAlign = 'left';
  }

  // JUMP timer
  if (!frog.balancing) {
    const cp = pads[curPad], tl = padTimeLeft(cp);
    const wt = currentEvent === 'spring' ? WARN_T * 2.5 : WARN_T;
    if (tl < wt * 0.5 && tl > 0) {
      const pulse = 0.75 + Math.sin(frame * 0.25) * 0.25;
      ctx.save(); ctx.globalAlpha = pulse;
      ctx.fillStyle = tl < 0.6 ? '#ff4040' : '#ffa020';
      ctx.font = 'bold 18px Arial'; ctx.textAlign = 'center';
      ctx.fillText('JUMP!  ' + tl.toFixed(1) + 's', W/2, 40);
      ctx.restore(); ctx.textAlign = 'left';
    }
  }

  // Control hints (first pad only)
  if (score === 0) {
    ctx.fillStyle = 'rgba(255,255,255,0.55)'; ctx.font = '12px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('Hold SPACE to charge — release to leap   |   Q: balance', W/2, H - 18);
    ctx.textAlign = 'left';
  }

  // Return to Menu button: shown on first pad (score=0) or during post-respawn invincibility
  if (score === 0 || (frame < invincibleUntil && lives < 3)) {
    ctx.fillStyle = 'rgba(10,30,10,0.82)';
    ctx.beginPath(); ctx.roundRect(W - 162, H - 50, 150, 34, 17); ctx.fill();
    ctx.fillStyle = '#9de89d'; ctx.font = 'bold 13px Arial'; ctx.textAlign = 'right';
    ctx.fillText('↩ Return to Menu', W - 18, H - 28);
    ctx.textAlign = 'left';
  }
}

  });

  // Scroll arrows
  const totalRows = Math.ceil(items.length / cols);
  if (totalRows > visRows) {
    if (scroll > 0) {
      ctx.fillStyle = '#5a9a5a'; ctx.font = '20px Arial'; ctx.textAlign = 'center';
      ctx.fillText('▲', W/2, gridTop - 6);
    }
    if (scroll + visRows < totalRows) {
      ctx.fillStyle = '#5a9a5a'; ctx.font = '20px Arial';
      ctx.fillText('▼', W/2, H - 80);
    }
  }

  ctx.fillStyle = '#183018';
  ctx.beginPath(); ctx.roundRect(W/2-70, H-66, 140, 42, 21); ctx.fill();
  ctx.fillStyle = '#7ac87a'; ctx.font = 'bold 16px Arial';
  ctx.fillText('BACK', W/2, H-40);
  ctx.textAlign = 'left';
}

// ── Frogs page ────────────────────────────────
function drawFrogsPage() {
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(0,10,0,0.78)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = '#3de83d'; ctx.font = 'bold 26px Arial'; ctx.fillText('YOUR FROGS', W/2, 64);
  drawFrogPreview(W/2, 152, 2.6, equippedSkin, equippedAccessory);
  const sk = SKINS.find(s => s.id === equippedSkin) || SKINS[0];
  ctx.fillStyle = '#80ff80'; ctx.font = '13px Arial'; ctx.fillText('Equipped: ' + sk.label, W/2, 218);
  ctx.fillStyle = '#aaa'; ctx.font = '12px Arial'; ctx.fillText('🍃 ' + lilyPadsTotal + ' lily pads earned', W/2, 240);
  ctx.strokeStyle = 'rgba(80,160,80,0.28)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(28, 258); ctx.lineTo(W-28, 258); ctx.stroke();
  const cols = 4, cellW = W / cols;
  const gridTop = 264, gridBot = H - 72;
  const skinRows = Math.ceil(SKINS.length / cols);
  const cellH = (gridBot - gridTop) / skinRows;
  SKINS.forEach((skin, idx) => {
    const col = idx % cols, row = Math.floor(idx / cols);
    const cx = cellW * col + cellW / 2;
    const cy = gridTop + row * cellH + cellH / 2;
    const owned = lilyPadsTotal >= skin.threshold;
    const equipped = skin.id === equippedSkin;
    ctx.fillStyle = equipped ? 'rgba(80,200,80,0.18)' : owned ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.12)';
    ctx.beginPath(); ctx.roundRect(cx-50, cy-cellH/2+5, 100, cellH-10, 10); ctx.fill();
    ctx.save(); ctx.globalAlpha = owned ? 1.0 : 0.32;
    if (skin.id === 'rainbow') {
      const rCols = ['#ff4040','#ff9800','#ffe020','#40cc40','#4088ff','#cc40cc'];
      rCols.forEach((c, ci) => {
        ctx.fillStyle = c; ctx.beginPath(); ctx.moveTo(cx, cy-14);
        ctx.arc(cx, cy-14, 20, ci*(Math.PI*2/6), (ci+1)*(Math.PI*2/6));
        ctx.closePath(); ctx.fill();
      });
    } else {
      ctx.fillStyle = skin.body;
      ctx.beginPath(); ctx.arc(cx, cy-14, 20, 0, Math.PI*2); ctx.fill();
    }
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(cx-7, cy-20, 4.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+7, cy-20, 4.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#222';
    ctx.beginPath(); ctx.arc(cx-6, cy-19, 2.2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+8, cy-19, 2.2, 0, Math.PI*2); ctx.fill();
    ctx.restore();
    ctx.fillStyle = owned ? '#ddd' : '#555'; ctx.font = '11px Arial'; ctx.fillText(skin.label, cx, cy + 10);
    if (!owned) {
      ctx.fillStyle = '#666'; ctx.font = '10px Arial'; ctx.fillText('🍃' + skin.threshold, cx, cy + 24);
    } else if (equipped) {
      ctx.fillStyle = '#80ff80'; ctx.font = 'bold 10px Arial'; ctx.fillText('✓ ON', cx, cy + 24);
    } else {
      ctx.fillStyle = '#aaa'; ctx.font = '10px Arial'; ctx.fillText('Tap', cx, cy + 24);
    }
  });
  ctx.fillStyle = '#183018';
  ctx.beginPath(); ctx.roundRect(W/2-70, H-66, 140, 42, 21); ctx.fill();
  ctx.fillStyle = '#7ac87a'; ctx.font = 'bold 16px Arial'; ctx.fillText('BACK', W/2, H-40);
  ctx.textAlign = 'left';
}

// ── Main menu ─────────────────────────────────
function drawMenu() {
  ctx.fillStyle = 'rgba(0,7,20,0.78)'; ctx.fillRect(0, 0, W, H);
  ctx.textAlign = 'center';

  if (menuPage === 'main') {
    // Username badge — top-left
    if (currentUser) {
      ctx.textAlign = 'left';
      ctx.fillStyle = 'rgba(20,50,20,0.75)';
      ctx.beginPath(); ctx.roundRect(10, 10, Math.min(180, ctx.measureText('👤 ' + currentUser.username).width + 22), 30, 15); ctx.fill();
      ctx.fillStyle = '#80f080'; ctx.font = 'bold 12px Arial';
      ctx.fillText('👤 ' + currentUser.username, 20, 30);
      ctx.textAlign = 'center';
    }

    const bobY = Math.sin(frame * 0.04) * 4;

    ctx.fillStyle = '#3de83d'; ctx.font = 'bold 80px Arial'; ctx.fillText('LEAP', W/2, 215);
    const qIdx = Math.floor(frame / 300) % MENU_QUOTES.length;

    ctx.fillStyle = '#fff'; ctx.font = 'bold 24px Arial'; ctx.fillText('PLAY', W/2, 294);
    ctx.fillStyle = '#1a3a1a';
    ctx.beginPath(); ctx.roundRect(W/2-82, 320, 164, 40, 20); ctx.fill();
    ctx.fillStyle = '#7ae87a'; ctx.font = 'bold 15px Arial'; ctx.fillText('YOUR FROGS', W/2, 346);
    ctx.fillStyle = '#1a3a1a';
    ctx.beginPath(); ctx.roundRect(W/2-82, 370, 164, 40, 20); ctx.fill();

  } else if (menuPage === 'frogs') {

  } else if (menuPage === 'shop') {
    drawShopPage(); ctx.textAlign = 'left'; return;

  } else {

    ctx.beginPath(); ctx.roundRect(W/2-70, 438, 140, 44, 22); ctx.fill();

}
